# cargo-deny configuration for MAE
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false
exclude = ["mae-gui", "mae-test-fixtures"]

[advisories]
ignore = [
    # bincode is unmaintained but pulled in transitively via steel-core.
    # We can't remove it without replacing the Scheme runtime.
    { id = "RUSTSEC-2025-0141", reason = "transitive dep via steel-core, no replacement available" },
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "BlueOak-1.0.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "Unlicense",
    "GPL-3.0-or-later",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
