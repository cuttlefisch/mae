# cargo-deny configuration for MAE
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true
no-default-features = false
# mae-gui requires system Skia deps not available in CI containers
exclude = ["mae-gui", "mae-test-fixtures"]

[advisories]
# Transitive deps of cozo 0.7.x — we can't fix upstream, tracked for
# resolution when cozo releases a new version or we swap backends.
ignore = [
    # bincode unmaintained (cozo → bincode)
    { id = "RUSTSEC-2025-0141", reason = "cozo direct dep, no upstream fix" },
    # fxhash unmaintained (cozo → fxhash)
    { id = "RUSTSEC-2025-0057", reason = "cozo direct dep, no upstream fix" },
    # lz4_flex: info leak on invalid data (cozo → swapvec → lz4_flex)
    { id = "RUSTSEC-2026-0041", reason = "cozo transitive dep, no upstream fix; data is trusted local" },
    # adler unmaintained (cozo → sled → …)
    { id = "RUSTSEC-2024-0384", reason = "sled transitive dep, no upstream fix" },
    # instant unmaintained (cozo → sled → parking_lot 0.11 → …)
    { id = "RUSTSEC-2025-0056", reason = "sled transitive dep, no upstream fix" },
    # ttf-parser unmaintained (winit → sctk-adwaita → ab_glyph → owned_ttf_parser → ttf-parser);
    # GUI-only font path, no safe upgrade available upstream (advisory says so explicitly)
    { id = "RUSTSEC-2026-0192", reason = "winit transitive dep (GUI font parsing), no upstream fix" },
    # quick-xml DoS advisories (winit → wayland-client/wayland-scanner → quick-xml, pinned
    # ^0.39 so the >=0.41 fix is unreachable without a winit ecosystem bump). wayland-scanner
    # uses quick-xml at BUILD TIME to parse the TRUSTED, crate-shipped Wayland protocol XML —
    # never attacker-controlled input — so both DoS threat models (untrusted XML) do not
    # apply. GUI/Wayland-only. 0194 = quadratic duplicate-attribute check; 0195 = unbounded
    # namespace-declaration allocation.
    { id = "RUSTSEC-2026-0194", reason = "wayland-scanner build-time parse of trusted protocol XML; not attacker input; quick-xml pinned ^0.39 upstream" },
    { id = "RUSTSEC-2026-0195", reason = "wayland-scanner build-time parse of trusted protocol XML; not attacker input; quick-xml pinned ^0.39 upstream" },
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "BlueOak-1.0.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "Unlicense",
    "GPL-3.0-or-later",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
