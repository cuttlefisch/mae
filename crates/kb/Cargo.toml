[package]
name = "mae-kb"
description = "Knowledge base layer (graph store, links)"
version = "0.1.1"
edition = "2021"
license = "GPL-3.0-or-later"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { workspace = true }
walkdir = "2"
notify = "6"

[dev-dependencies]
tempfile = "3"
