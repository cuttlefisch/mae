# Gruvbox Light — warm retro theme, light variant
inherits = "default"

[palette]
bg0 = "#fbf1c7"
bg1 = "#ebdbb2"
bg2 = "#d5c4a1"
bg3 = "#bdae93"
fg0 = "#282828"
fg1 = "#3c3836"
fg2 = "#504945"
fg3 = "#665c54"
fg4 = "#7c6f64"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
purple = "#b16286"
aqua = "#689d6a"
orange = "#d65d0e"
gray = "#928374"

[styles]
"ui.background" = { bg = "bg0" }
"ui.text" = { fg = "fg1" }
"ui.window.border" = { fg = "bg3" }
"ui.window.border.active" = { fg = "blue" }
"ui.statusline" = { fg = "fg1", bg = "bg1" }
"ui.statusline.text" = { fg = "fg1", bg = "bg1" }
"ui.statusline.mode.normal" = { fg = "bg0", bg = "blue", bold = true }
"ui.statusline.mode.insert" = { fg = "bg0", bg = "green", bold = true }
"ui.statusline.mode.command" = { fg = "bg0", bg = "yellow", bold = true }
"ui.statusline.mode.conversation" = { fg = "bg0", bg = "purple", bold = true }
"ui.statusline.mode.visual" = { fg = "bg0", bg = "purple", bold = true }
"ui.statusline.mode.locked" = { fg = "bg0", bg = "red", bold = true }
"ui.statusline.mode.mcp" = { fg = "bg0", bg = "yellow", bold = true }
"ui.statusline.ai.standard" = { fg = "bg0", bg = "green", bold = true }
"ui.statusline.ai.auto" = { fg = "bg0", bg = "yellow", bold = true }
"ui.statusline.ai.plan" = { fg = "bg0", bg = "blue", bold = true }
"ui.gutter" = { fg = "bg3" }
"ui.gutter.selected" = { fg = "yellow" }
"ui.popup" = { fg = "fg1", bg = "bg1" }
"ui.popup.key" = { fg = "fg0", bold = true }
"ui.popup.group" = { fg = "aqua", bold = true }
"ui.popup.text" = { fg = "fg3" }
"ui.commandline" = { fg = "fg1" }
"ui.cursor" = { fg = "bg0", bg = "fg1" }
"ui.selection" = { bg = "bg2" }
"ui.search.match" = { fg = "bg0", bg = "yellow" }
"ui.cursorline" = { bg = "bg1" }

"diagnostic.error" = { fg = "red", bold = true }
"diagnostic.warn" = { fg = "orange" }
"diagnostic.info" = { fg = "green" }
"diagnostic.hint" = { fg = "blue" }
"diagnostic.debug" = { fg = "gray" }
"diagnostic.target" = { fg = "aqua" }

"lsp.highlight.read" = { bg = "bg1" }
"lsp.highlight.write" = { bg = "bg2" }
"lsp.highlight.text" = { bg = "bg1" }

"conversation.user" = { fg = "aqua", bold = true }
"conversation.assistant" = { fg = "green", bold = true }
"conversation.system" = { fg = "yellow" }
"conversation.tool" = { fg = "orange" }
"conversation.tool.result" = { fg = "fg4" }
"conversation.input" = { fg = "aqua" }
"conversation.user.text" = { fg = "fg1" }
"conversation.assistant.text" = { fg = "fg1" }

"keyword" = { fg = "red" }
"string" = { fg = "green" }
"number" = { fg = "purple" }
"comment" = { fg = "gray", italic = true }
"function" = { fg = "green" }
"type" = { fg = "yellow" }
"variable" = { fg = "blue" }
"constant" = { fg = "purple" }
"operator" = { fg = "fg1" }
"attribute" = { fg = "aqua" }
"namespace" = { fg = "yellow" }
"punctuation" = { fg = "fg3" }
"markup.link" = { fg = "aqua", underline = true }
"markup.todo" = { fg = "red", bold = true }
"markup.done" = { fg = "green" }
"markup.checkbox" = { fg = "yellow", bold = true }
"markup.checkbox.checked" = { fg = "green" }
"markup.drawer" = { fg = "gray" }

# Native KB graph view. See catppuccin-mocha.toml's comment for the
# role-mapping rationale — reuses this theme's own palette, not hand-picked
# hexes. Mirrors default.toml's key set.
"ui.graph.background" = { bg = "bg0" }
"ui.graph.node" = { fg = "fg1" }
"ui.graph.node.index" = { fg = "yellow" }   # namespace
"ui.graph.node.command" = { fg = "red" }    # keyword
"ui.graph.node.concept" = { fg = "green" }  # function
"ui.graph.node.key" = { fg = "purple" }     # constant
"ui.graph.node.note" = { fg = "green" }     # string
"ui.graph.node.project" = { fg = "yellow" } # type
"ui.graph.node.category" = { fg = "aqua" }  # attribute
"ui.graph.node.lesson" = { fg = "green" }   # markup.done
"ui.graph.node.tutorial" = { fg = "green" } # diagnostic.info
"ui.graph.node.meta" = { fg = "red" }       # diagnostic.error
"ui.graph.node.block" = { fg = "purple" }   # number
"ui.graph.node.scheme_api" = { fg = "blue" }# diagnostic.hint
"ui.graph.node.task" = { fg = "red" }       # markup.todo
"ui.graph.node.view" = { fg = "fg1" }       # operator
"ui.graph.node.selected" = { fg = "orange" }# diagnostic.warn
"ui.graph.node.hover" = { fg = "aqua" }     # markup.link
"ui.graph.edge" = { fg = "gray" }           # comment
"ui.graph.edge.boundary" = { fg = "red" }   # diagnostic.error

"diff.added" = { fg = "green" }
"diff.removed" = { fg = "red" }
"diff.hunk" = { fg = "purple" }
"diff.header" = { fg = "aqua", bold = true }
