# One Dark — Atom's iconic dark theme
inherits = "default"

[palette]
bg = "#282c34"
bg_light = "#2c313c"
bg_highlight = "#3e4452"
fg = "#abb2bf"
fg_dark = "#5c6370"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
purple = "#c678dd"
cyan = "#56b6c2"
orange = "#d19a66"
gutter = "#4b5263"

[styles]
"ui.background" = { bg = "bg" }
"ui.text" = { fg = "fg" }
"ui.window.border" = { fg = "bg_highlight" }
"ui.window.border.active" = { fg = "blue" }
"ui.statusline" = { fg = "fg", bg = "bg_light" }
"ui.statusline.text" = { fg = "fg", bg = "bg_light" }
"ui.statusline.mode.normal" = { fg = "bg", bg = "blue", bold = true }
"ui.statusline.mode.insert" = { fg = "bg", bg = "green", bold = true }
"ui.statusline.mode.command" = { fg = "bg", bg = "yellow", bold = true }
"ui.statusline.mode.conversation" = { fg = "bg", bg = "purple", bold = true }
"ui.statusline.mode.visual" = { fg = "bg", bg = "purple", bold = true }
"ui.statusline.mode.locked" = { fg = "bg", bg = "red", bold = true }
"ui.statusline.mode.mcp" = { fg = "bg", bg = "yellow", bold = true }
"ui.statusline.ai.standard" = { fg = "bg", bg = "green", bold = true }
"ui.statusline.ai.auto" = { fg = "bg", bg = "yellow", bold = true }
"ui.statusline.ai.plan" = { fg = "bg", bg = "blue", bold = true }
"ui.gutter" = { fg = "gutter" }
"ui.gutter.selected" = { fg = "yellow" }
"ui.popup" = { fg = "fg", bg = "bg_light" }
"ui.popup.key" = { fg = "fg", bold = true }
"ui.popup.group" = { fg = "cyan", bold = true }
"ui.popup.text" = { fg = "fg_dark" }
"ui.commandline" = { fg = "fg" }
"ui.cursor" = { fg = "bg", bg = "fg" }
"ui.selection" = { bg = "bg_highlight" }
"ui.search.match" = { fg = "bg", bg = "yellow" }
"ui.cursorline" = { bg = "bg_light" }

"diagnostic.error" = { fg = "red", bold = true }
"diagnostic.warn" = { fg = "yellow" }
"diagnostic.info" = { fg = "green" }
"diagnostic.hint" = { fg = "blue" }
"diagnostic.debug" = { fg = "fg_dark" }
"diagnostic.trace" = { fg = "gutter", dim = true }
"diagnostic.target" = { fg = "cyan" }

"lsp.highlight.read" = { bg = "bg_light" }
"lsp.highlight.write" = { bg = "bg_highlight" }
"lsp.highlight.text" = { bg = "bg_light" }

"conversation.user" = { fg = "cyan", bold = true }
"conversation.assistant" = { fg = "green", bold = true }
"conversation.system" = { fg = "yellow" }
"conversation.tool" = { fg = "orange" }
"conversation.tool.result" = { fg = "fg_dark" }
"conversation.input" = { fg = "cyan" }
"conversation.user.text" = { fg = "fg" }
"conversation.assistant.text" = { fg = "fg" }

"debug.current_line" = { bg = "yellow", fg = "bg" }
"debug.breakpoint" = { fg = "red", bold = true }
"debug.variable.name" = { fg = "red" }
"debug.variable.type" = { fg = "cyan" }
"debug.variable.value" = { fg = "fg" }
"debug.stack.active" = { fg = "fg", bold = true }
"debug.stack.inactive" = { fg = "fg_dark" }

"keyword" = { fg = "purple" }
"string" = { fg = "green" }
"number" = { fg = "orange" }
"comment" = { fg = "fg_dark", italic = true }
"function" = { fg = "blue" }
"type" = { fg = "yellow" }
"variable" = { fg = "red" }
"operator" = { fg = "cyan" }
"constant" = { fg = "orange" }
"attribute" = { fg = "yellow" }
"namespace" = { fg = "yellow" }
"punctuation" = { fg = "fg" }
"markup.link" = { fg = "blue", underline = true }
"markup.todo" = { fg = "red", bold = true }
"markup.done" = { fg = "green" }
"markup.checkbox" = { fg = "yellow", bold = true }
"markup.checkbox.checked" = { fg = "green" }
"markup.drawer" = { fg = "fg_dark" }

# Native KB graph view. See catppuccin-mocha.toml's comment for the
# role-mapping rationale — reuses this theme's own palette, not hand-picked
# hexes. Mirrors default.toml's key set.
"ui.graph.background" = { bg = "bg" }
"ui.graph.node" = { fg = "fg" }
"ui.graph.node.index" = { fg = "yellow" }   # namespace
"ui.graph.node.command" = { fg = "purple" } # keyword
"ui.graph.node.concept" = { fg = "blue" }   # function
"ui.graph.node.key" = { fg = "orange" }     # constant
"ui.graph.node.note" = { fg = "green" }     # string
"ui.graph.node.project" = { fg = "yellow" } # type
"ui.graph.node.category" = { fg = "yellow" }# attribute
"ui.graph.node.lesson" = { fg = "green" }   # markup.done
"ui.graph.node.tutorial" = { fg = "green" } # diagnostic.info
"ui.graph.node.meta" = { fg = "red" }       # diagnostic.error
"ui.graph.node.block" = { fg = "orange" }   # number
"ui.graph.node.scheme_api" = { fg = "blue" }# diagnostic.hint
"ui.graph.node.task" = { fg = "red" }       # markup.todo
"ui.graph.node.view" = { fg = "cyan" }      # operator
"ui.graph.node.selected" = { fg = "yellow" }# diagnostic.warn
"ui.graph.node.hover" = { fg = "blue" }     # markup.link
"ui.graph.edge" = { fg = "fg_dark" }        # comment
"ui.graph.edge.boundary" = { fg = "red" }   # diagnostic.error

"diff.added" = { fg = "green" }
"diff.removed" = { fg = "red" }
"diff.hunk" = { fg = "purple" }
"diff.header" = { fg = "cyan", bold = true }
