# Default MAE theme — ANSI named colors only, works on all terminals.

[palette]
# Gruvbox-inspired palette defaults. Child themes override these.
# Without palette entries, "yellow" etc. fall through to ANSI named
# colors which look harsh — especially at scaled heading sizes.
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#ebdbb2"
black = "#282828"
dark_gray = "#928374"
gray = "#a89984"

[styles]
"ui.background" = { bg = "black" }
"ui.text" = { fg = "white" }
"ui.window.border" = { fg = "dark_gray" }
"ui.window.border.active" = { fg = "blue" }
"ui.statusline" = { fg = "white", bg = "dark_gray" }
"ui.statusline.text" = { fg = "white", bg = "dark_gray" }
"ui.statusline.mode.normal" = { fg = "black", bg = "blue", bold = true }
"ui.statusline.mode.insert" = { fg = "black", bg = "green", bold = true }
"ui.statusline.mode.command" = { fg = "black", bg = "yellow", bold = true }
"ui.statusline.mode.conversation" = { fg = "black", bg = "magenta", bold = true }
"ui.statusline.mode.visual" = { fg = "black", bg = "magenta", bold = true }
"ui.statusline.mode.locked" = { fg = "black", bg = "red", bold = true }
"ui.statusline.mode.mcp" = { fg = "black", bg = "yellow", bold = true }
"ui.statusline.ai.standard" = { fg = "black", bg = "green", bold = true }
"ui.statusline.ai.auto" = { fg = "black", bg = "yellow", bold = true }
"ui.statusline.ai.plan" = { fg = "black", bg = "blue", bold = true }
"ui.gutter" = { fg = "dark_gray" }
"ui.gutter.selected" = { fg = "yellow" }
"ui.popup" = { fg = "white" }
"ui.popup.key" = { fg = "white", bold = true }
"ui.popup.group" = { fg = "cyan", bold = true }
"ui.popup.text" = { fg = "gray" }
"ui.commandline" = { fg = "white" }
"ui.cursor" = { fg = "black", bg = "white" }
"ui.selection" = { bg = "blue" }
"ui.search.match" = { fg = "black", bg = "yellow" }
"ui.cursorline" = { bg = "dark_gray" }

"diagnostic.error" = { fg = "red", bold = true }
"diagnostic.warn" = { fg = "yellow" }
"diagnostic.info" = { fg = "green" }
"diagnostic.hint" = { fg = "blue" }
"diagnostic.debug" = { fg = "dark_gray" }
"diagnostic.trace" = { fg = "dark_gray", dim = true }
"diagnostic.target" = { fg = "cyan" }

"conversation.user" = { fg = "cyan", bold = true }
"conversation.assistant" = { fg = "green", bold = true }
"conversation.system" = { fg = "yellow" }
"conversation.tool" = { fg = "yellow" }
"conversation.tool.result" = { fg = "dark_gray" }
"conversation.input" = { fg = "cyan" }
"conversation.user.text" = { fg = "white" }
"conversation.assistant.text" = { fg = "white" }

"debug.current_line" = { bg = "yellow", fg = "black" }
"debug.breakpoint" = { fg = "red", bold = true }
"debug.variable.name" = { fg = "yellow" }
"debug.variable.type" = { fg = "cyan" }
"debug.variable.value" = { fg = "white" }
"debug.stack.active" = { fg = "white", bold = true }
"debug.stack.inactive" = { fg = "gray" }
"debug.output" = { fg = "white" }
"debug.hint" = { fg = "dark_gray" }

"keyword" = { fg = "red" }
"string" = { fg = "green" }
"number" = { fg = "magenta" }
"comment" = { fg = "dark_gray", italic = true }
"function" = { fg = "cyan" }
"type" = { fg = "yellow" }
"variable" = { fg = "white" }
"operator" = { fg = "white" }
"constant" = { fg = "magenta" }
"attribute" = { fg = "cyan" }
"namespace" = { fg = "yellow" }
"punctuation" = { fg = "gray" }

# Markdown / org-mode markup styling.
"markup.heading" = { fg = "yellow", bold = true }
"markup.link" = { fg = "cyan", underline = true }
"markup.literal" = { fg = "green" }
"markup.bold" = { fg = "white", bold = true }
"markup.italic" = { fg = "white", italic = true }
"markup.list" = { fg = "magenta" }
"markup.quote" = { fg = "gray", italic = true }
"markup.strikethrough" = { fg = "dark_gray", strikethrough = true }
"markup.todo" = { fg = "red", bold = true }
"markup.done" = { fg = "green" }
"markup.checkbox" = { fg = "yellow", bold = true }
"markup.checkbox.checked" = { fg = "green" }
"markup.code_block" = { bg = "#32302f" }

"diff.added" = { fg = "green" }
"diff.removed" = { fg = "red" }
"diff.hunk" = { fg = "magenta" }
"diff.header" = { fg = "cyan", bold = true }
