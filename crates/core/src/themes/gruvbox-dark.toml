# Gruvbox Dark — warm retro theme by morhetz
inherits = "default"

[palette]
bg0 = "#282828"
bg1 = "#3c3836"
bg2 = "#504945"
bg3 = "#665c54"
fg0 = "#fbf1c7"
fg1 = "#ebdbb2"
fg2 = "#d5c4a1"
fg3 = "#bdae93"
fg4 = "#a89984"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
purple = "#b16286"
aqua = "#689d6a"
orange = "#d65d0e"
gray = "#928374"
bright_red = "#fb4934"
bright_green = "#b8bb26"
bright_yellow = "#fabd2f"
bright_blue = "#83a598"
bright_purple = "#d3869b"
bright_aqua = "#8ec07c"
bright_orange = "#fe8019"

[styles]
"ui.background" = { bg = "bg0" }
"ui.text" = { fg = "fg1" }
"ui.window.border" = { fg = "bg3" }
"ui.window.border.active" = { fg = "bright_blue" }
"ui.statusline" = { fg = "fg1", bg = "bg1" }
"ui.statusline.text" = { fg = "fg1", bg = "bg1" }
"ui.statusline.mode.normal" = { fg = "bg0", bg = "bright_blue", bold = true }
"ui.statusline.mode.insert" = { fg = "bg0", bg = "bright_green", bold = true }
"ui.statusline.mode.command" = { fg = "bg0", bg = "bright_yellow", bold = true }
"ui.statusline.mode.conversation" = { fg = "bg0", bg = "bright_purple", bold = true }
"ui.gutter" = { fg = "bg3" }
"ui.gutter.selected" = { fg = "bright_yellow" }
"ui.popup" = { fg = "fg1", bg = "bg1" }
"ui.popup.key" = { fg = "fg0", bold = true }
"ui.popup.group" = { fg = "bright_aqua", bold = true }
"ui.popup.text" = { fg = "fg3" }
"ui.commandline" = { fg = "fg1" }
"ui.cursor" = { fg = "bg0", bg = "fg1" }
"ui.selection" = { bg = "bg2" }
"ui.search.match" = { fg = "bg0", bg = "yellow" }
"ui.cursorline" = { bg = "bg1" }

"diagnostic.error" = { fg = "bright_red", bold = true }
"diagnostic.warn" = { fg = "bright_yellow" }
"diagnostic.info" = { fg = "bright_green" }
"diagnostic.hint" = { fg = "bright_blue" }
"diagnostic.debug" = { fg = "gray" }
"diagnostic.trace" = { fg = "bg3", dim = true }
"diagnostic.target" = { fg = "bright_aqua" }

"conversation.user" = { fg = "bright_aqua", bold = true }
"conversation.assistant" = { fg = "bright_green", bold = true }
"conversation.system" = { fg = "bright_yellow" }
"conversation.tool" = { fg = "bright_orange" }
"conversation.tool.result" = { fg = "fg4" }
"conversation.input" = { fg = "bright_aqua" }

"debug.current_line" = { bg = "bright_yellow", fg = "bg0" }
"debug.breakpoint" = { fg = "bright_red", bold = true }
"debug.variable.name" = { fg = "bright_yellow" }
"debug.variable.type" = { fg = "bright_aqua" }
"debug.variable.value" = { fg = "fg1" }
"debug.stack.active" = { fg = "fg0", bold = true }
"debug.stack.inactive" = { fg = "fg4" }
"debug.output" = { fg = "fg1" }
"debug.hint" = { fg = "bg3" }

"keyword" = { fg = "red" }
"string" = { fg = "green" }
"number" = { fg = "purple" }
"comment" = { fg = "gray", italic = true }
"function" = { fg = "bright_green" }
"type" = { fg = "bright_yellow" }
"variable" = { fg = "bright_blue" }
"operator" = { fg = "fg1" }
"constant" = { fg = "bright_purple" }
"attribute" = { fg = "bright_aqua" }
"namespace" = { fg = "bright_yellow" }
"punctuation" = { fg = "fg3" }
