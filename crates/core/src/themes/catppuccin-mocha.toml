# Catppuccin Mocha — soothing pastel dark theme
inherits = "default"

[palette]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[styles]
"ui.background" = { bg = "base" }
"ui.text" = { fg = "text" }
"ui.window.border" = { fg = "surface2" }
"ui.window.border.active" = { fg = "blue" }
"ui.statusline" = { fg = "text", bg = "mantle" }
"ui.statusline.text" = { fg = "text", bg = "mantle" }
"ui.statusline.mode.normal" = { fg = "base", bg = "blue", bold = true }
"ui.statusline.mode.insert" = { fg = "base", bg = "green", bold = true }
"ui.statusline.mode.command" = { fg = "base", bg = "yellow", bold = true }
"ui.statusline.mode.conversation" = { fg = "base", bg = "mauve", bold = true }
"ui.statusline.mode.visual" = { fg = "base", bg = "mauve", bold = true }
"ui.statusline.mode.locked" = { fg = "base", bg = "red", bold = true }
"ui.statusline.mode.mcp" = { fg = "base", bg = "yellow", bold = true }
"ui.statusline.ai.standard" = { fg = "base", bg = "green", bold = true }
"ui.statusline.ai.auto" = { fg = "base", bg = "yellow", bold = true }
"ui.statusline.ai.plan" = { fg = "base", bg = "blue", bold = true }
"ui.gutter" = { fg = "overlay0" }
"ui.gutter.selected" = { fg = "yellow" }
"ui.popup" = { fg = "text", bg = "surface0" }
"ui.popup.key" = { fg = "text", bold = true }
"ui.popup.group" = { fg = "teal", bold = true }
"ui.popup.text" = { fg = "subtext0" }
"ui.commandline" = { fg = "text" }
"ui.cursor" = { fg = "base", bg = "text" }
"ui.selection" = { bg = "surface1" }
"ui.search.match" = { fg = "base", bg = "yellow" }
"ui.cursorline" = { bg = "surface0" }

"diagnostic.error" = { fg = "red", bold = true }
"diagnostic.warn" = { fg = "yellow" }
"diagnostic.info" = { fg = "green" }
"diagnostic.hint" = { fg = "sky" }
"diagnostic.debug" = { fg = "overlay1" }
"diagnostic.trace" = { fg = "overlay0", dim = true }
"diagnostic.target" = { fg = "teal" }

"lsp.highlight.read" = { bg = "surface0" }
"lsp.highlight.write" = { bg = "surface1" }
"lsp.highlight.text" = { bg = "surface0" }

"conversation.user" = { fg = "sapphire", bold = true }
"conversation.assistant" = { fg = "green", bold = true }
"conversation.system" = { fg = "yellow" }
"conversation.tool" = { fg = "peach" }
"conversation.tool.result" = { fg = "overlay1" }
"conversation.input" = { fg = "sapphire" }
"conversation.user.text" = { fg = "text" }
"conversation.assistant.text" = { fg = "text" }

"debug.current_line" = { bg = "yellow", fg = "base" }
"debug.breakpoint" = { fg = "red", bold = true }
"debug.variable.name" = { fg = "yellow" }
"debug.variable.type" = { fg = "teal" }
"debug.variable.value" = { fg = "text" }
"debug.stack.active" = { fg = "text", bold = true }
"debug.stack.inactive" = { fg = "overlay1" }

"keyword" = { fg = "mauve" }
"string" = { fg = "green" }
"number" = { fg = "peach" }
"comment" = { fg = "overlay1", italic = true }
"function" = { fg = "blue" }
"type" = { fg = "yellow" }
"variable" = { fg = "text" }
"operator" = { fg = "sky" }
"constant" = { fg = "peach" }
"attribute" = { fg = "teal" }
"namespace" = { fg = "blue" }
"punctuation" = { fg = "overlay2" }
"markup.link" = { fg = "sapphire", underline = true }
"markup.todo" = { fg = "red", bold = true }
"markup.done" = { fg = "green" }
"markup.checkbox" = { fg = "yellow", bold = true }
"markup.checkbox.checked" = { fg = "green" }
"markup.drawer" = { fg = "overlay1" }

# Native KB graph view. Each key reuses this theme's own color for the
# syntax-highlighting role closest to that node kind's semantics (e.g.
# Task -> markup.todo, since a Task node literally is a todo item) —
# rather than hand-picked hexes with no rationale, so this stays grounded
# in Catppuccin Mocha's actual palette. Mirrors default.toml's key set.
"ui.graph.background" = { bg = "base" }
"ui.graph.node" = { fg = "text" }
"ui.graph.node.index" = { fg = "blue" }        # namespace
"ui.graph.node.command" = { fg = "mauve" }     # keyword
"ui.graph.node.concept" = { fg = "blue" }      # function
"ui.graph.node.key" = { fg = "peach" }         # constant
"ui.graph.node.note" = { fg = "green" }        # string
"ui.graph.node.project" = { fg = "yellow" }    # type
"ui.graph.node.category" = { fg = "teal" }     # attribute
"ui.graph.node.lesson" = { fg = "green" }      # markup.done
"ui.graph.node.tutorial" = { fg = "green" }    # diagnostic.info
"ui.graph.node.meta" = { fg = "red" }          # diagnostic.error
"ui.graph.node.block" = { fg = "peach" }       # number
"ui.graph.node.scheme_api" = { fg = "sky" }    # diagnostic.hint
"ui.graph.node.task" = { fg = "red" }          # markup.todo
"ui.graph.node.view" = { fg = "sky" }          # operator
"ui.graph.node.selected" = { fg = "yellow" }   # diagnostic.warn
"ui.graph.node.hover" = { fg = "sapphire" }    # markup.link
"ui.graph.edge" = { fg = "overlay1" }          # comment
"ui.graph.edge.boundary" = { fg = "red" }      # diagnostic.error

"diff.added" = { fg = "green" }
"diff.removed" = { fg = "red" }
"diff.hunk" = { fg = "mauve" }
"diff.header" = { fg = "teal", bold = true }
