# Light ANSI theme — named ANSI colors only, light background.
# Designed for terminals with light color schemes (light mode IDE, light terminal).
# Uses no RGB hex values — adapts to whatever your terminal's ANSI palette is.

[palette]

[styles]
"ui.background" = { bg = "white" }
"ui.text" = { fg = "black" }
"ui.window.border" = { fg = "gray" }
"ui.window.border.active" = { fg = "blue" }
"ui.statusline" = { fg = "black", bg = "gray" }
"ui.statusline.text" = { fg = "black", bg = "gray" }
"ui.statusline.mode.normal" = { fg = "white", bg = "blue", bold = true }
"ui.statusline.mode.insert" = { fg = "white", bg = "green", bold = true }
"ui.statusline.mode.command" = { fg = "white", bg = "yellow", bold = true }
"ui.statusline.mode.conversation" = { fg = "white", bg = "magenta", bold = true }
"ui.statusline.mode.visual" = { fg = "white", bg = "magenta", bold = true }
"ui.statusline.mode.locked" = { fg = "white", bg = "red", bold = true }
"ui.statusline.mode.mcp" = { fg = "white", bg = "yellow", bold = true }
"ui.statusline.ai.standard" = { fg = "white", bg = "green", bold = true }
"ui.statusline.ai.auto" = { fg = "white", bg = "yellow", bold = true }
"ui.statusline.ai.plan" = { fg = "white", bg = "blue", bold = true }
"ui.gutter" = { fg = "gray" }
"ui.gutter.selected" = { fg = "yellow" }
"ui.popup" = { fg = "black" }
"ui.popup.key" = { fg = "black", bold = true }
"ui.popup.group" = { fg = "cyan", bold = true }
"ui.popup.text" = { fg = "dark_gray" }
"ui.commandline" = { fg = "black" }
"ui.cursor" = { fg = "white", bg = "black" }
"ui.selection" = { bg = "cyan" }
"ui.search.match" = { fg = "black", bg = "yellow" }
"ui.cursorline" = { bg = "gray" }

"diagnostic.error" = { fg = "red", bold = true }
"diagnostic.warn" = { fg = "yellow" }
"diagnostic.info" = { fg = "green" }
"diagnostic.hint" = { fg = "blue" }
"diagnostic.debug" = { fg = "dark_gray" }
"diagnostic.trace" = { fg = "dark_gray", dim = true }
"diagnostic.target" = { fg = "cyan" }

"lsp.highlight.read" = { bg = "gray" }
"lsp.highlight.write" = { bg = "dark_gray" }
"lsp.highlight.text" = { bg = "gray" }

"conversation.user" = { fg = "blue", bold = true }
"conversation.assistant" = { fg = "green", bold = true }
"conversation.system" = { fg = "yellow" }
"conversation.tool" = { fg = "yellow" }
"conversation.tool.result" = { fg = "dark_gray" }
"conversation.input" = { fg = "blue" }
"conversation.user.text" = { fg = "black" }
"conversation.assistant.text" = { fg = "black" }

"debug.current_line" = { bg = "yellow", fg = "black" }
"debug.breakpoint" = { fg = "red", bold = true }
"debug.variable.name" = { fg = "yellow" }
"debug.variable.type" = { fg = "cyan" }
"debug.variable.value" = { fg = "black" }
"debug.stack.active" = { fg = "black", bold = true }
"debug.stack.inactive" = { fg = "dark_gray" }
"debug.output" = { fg = "black" }
"debug.hint" = { fg = "dark_gray" }

"keyword" = { fg = "red" }
"string" = { fg = "green" }
"number" = { fg = "magenta" }
"comment" = { fg = "dark_gray", italic = true }
"function" = { fg = "cyan" }
"type" = { fg = "yellow" }
"variable" = { fg = "black" }
"operator" = { fg = "black" }
"constant" = { fg = "magenta" }
"attribute" = { fg = "cyan" }
"namespace" = { fg = "yellow" }
"punctuation" = { fg = "dark_gray" }

"markup.heading" = { fg = "blue", bold = true }
"markup.link" = { fg = "cyan", underline = true }
"markup.literal" = { fg = "green" }
"markup.bold" = { fg = "black", bold = true }
"markup.italic" = { fg = "black", italic = true }
"markup.list" = { fg = "magenta" }
"markup.quote" = { fg = "dark_gray", italic = true }
"markup.strikethrough" = { fg = "gray", strikethrough = true }
"markup.todo" = { fg = "red", bold = true }
"markup.done" = { fg = "green" }
"markup.checkbox" = { fg = "yellow", bold = true }
"markup.checkbox.checked" = { fg = "green" }
"markup.drawer" = { fg = "dark_gray" }
"markup.hr" = { fg = "gray" }
"markup.priority.a" = { fg = "red", bold = true }
"markup.priority.b" = { fg = "yellow", bold = true }
"markup.priority.c" = { fg = "green" }
"markup.code_block" = { bg = "#f0f0f0" }

# Collaborative cursor palette (8 colors, WCAG AA against light backgrounds).
"ui.collab.cursor.0" = { fg = "#DC2626" }
"ui.collab.cursor.1" = { fg = "#2563EB" }
"ui.collab.cursor.2" = { fg = "#059669" }
"ui.collab.cursor.3" = { fg = "#D97706" }
"ui.collab.cursor.4" = { fg = "#7C3AED" }
"ui.collab.cursor.5" = { fg = "#0691B2" }
"ui.collab.cursor.6" = { fg = "#DB2777" }
"ui.collab.cursor.7" = { fg = "#64748B" }
"ui.collab.selection.0" = { bg = "#DC2626" }
"ui.collab.selection.1" = { bg = "#2563EB" }
"ui.collab.selection.2" = { bg = "#059669" }
"ui.collab.selection.3" = { bg = "#D97706" }
"ui.collab.selection.4" = { bg = "#7C3AED" }
"ui.collab.selection.5" = { bg = "#0691B2" }
"ui.collab.selection.6" = { bg = "#DB2777" }
"ui.collab.selection.7" = { bg = "#64748B" }
"ui.collab.label" = { fg = "black", bold = true }

"diff.added" = { fg = "green" }
"diff.removed" = { fg = "red" }
"diff.hunk" = { fg = "magenta" }
"diff.header" = { fg = "cyan", bold = true }

# Native KB graph view (Part C). This theme is standalone (no `inherits`),
# so it doesn't pick up default.toml's per-NodeKind hex keys — a single
# base color plus Theme::style's dot-hierarchy fallback
# (ui.graph.node.<kind> -> ui.graph.node) is the right-sized amount of
# named-ANSI-only styling here, matching this theme's existing philosophy.
"ui.graph.background" = { bg = "white" }
"ui.graph.node" = { fg = "blue" }
"ui.graph.node.selected" = { fg = "yellow", bold = true }
"ui.graph.edge" = { fg = "gray" }
"ui.graph.edge.boundary" = { fg = "red" }
