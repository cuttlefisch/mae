[package]
name = "mae-core"
description = "Buffer management, event loop, and core primitives"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-or-later"

[dependencies]
ropey = "1"
unicode-width = "0.2"
unicode-segmentation = "1.12"
regex = "1"
tracing = { workspace = true }
toml = "0.8"
tree-sitter = "0.25"
tree-sitter-highlight = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-toml-ng = "0.7"
tree-sitter-md = "0.3"

[dev-dependencies]
tempfile = "3"
