[package]
name = "mae-sync"
version = "0.13.0"
edition = "2021"
license = "GPL-3.0-or-later"

[dependencies]
yrs = { version = "0.27", features = ["sync"] }
ropey = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
similar = "2"
tracing = "0.1"
sha2 = "0.10"

[dev-dependencies]
rand = "0.9"
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "crdt_ops"
harness = false
