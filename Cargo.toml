[workspace]
members = [
    "crates/core",
    "crates/renderer",
    "crates/scheme",
    "crates/lsp",
    "crates/dap",
    "crates/ai",
    "crates/kb",
    "crates/mae",
    "crates/shell",
    "crates/mcp",
]
resolver = "2"

[workspace.dependencies]
tracing = "0.1"
rusqlite = { version = "0.31", features = ["bundled"] }
