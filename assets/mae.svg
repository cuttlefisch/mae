<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="80" ry="80" fill="none" stroke="#e94560" stroke-width="4" opacity="0.6"/>
  <!-- MAE text -->
  <text x="256" y="310" font-family="monospace, 'Courier New', Courier" font-size="200" font-weight="bold" fill="#e94560" text-anchor="middle" letter-spacing="-8">MAE</text>
  <!-- Subtle accent line under text -->
  <rect x="96" y="340" width="320" height="4" rx="2" fill="#0f3460" opacity="0.8"/>
</svg>
