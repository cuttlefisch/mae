# MAE Configuration
# Place this file at ~/.config/mae/config.toml
# or use :edit-config to open it from within MAE.
#
# First-time users: the setup wizard runs automatically on first launch.
# For guided setup: :help tutorial:ai-setup (AI) or :help tutorial:collab-setup (collab)

[editor]
# Color theme (use :theme or SPC t s to preview)
# Available: default, dark-ansi, light-ansi, gruvbox-dark, gruvbox-light,
#   dracula, catppuccin-mocha, solarized-dark, one-dark
theme = "default"

# Show line numbers in the gutter
line_numbers = true

# Use relative line numbers (distance from cursor)
relative_line_numbers = false

# Soft-wrap long lines at the window edge
word_wrap = false

# Indent wrapped continuation lines to match original indentation
break_indent = true

# Character prefix for wrapped continuation lines
show_break = "↪ "

# Hide *bold* and /italic/ markers in Org-mode
org_hide_emphasis_markers = false

# Show link labels instead of raw markup (Emacs org-link-descriptive)
link_descriptive = true

# Apply inline bold/italic/code styling in conversation and KB buffers
render_markup = true

# Show FPS/frame-timing overlay in the status bar
show_fps = false

# GUI primary font family
# font_family = "JetBrainsMono Nerd Font"

# GUI icon font family (fallback for icons/symbols)
# icon_font_family = "Symbols Nerd Font Mono"

# GUI font size in points (6.0–72.0)
font_size = 14.0

# Show RSS/CPU/frame-time in status bar (debug mode)
debug_mode = false

# Clipboard integration:
#   "unnamedplus" - paste from system clipboard
#   "unnamed"     - yank syncs out, paste reads internal
#   "internal"    - no clipboard sync
clipboard = "unnamed"

# Automatically restore the previous session on startup (per-project)
restore_session = false

# Autosave interval in seconds (0 = disabled). Requires 5s idle after last edit.
# autosave_interval = 300

[ai]
# AI provider: "claude", "openai", "gemini", "ollama", or "deepseek"
provider = "claude"

# API key generation links:
#   Claude:   https://console.anthropic.com/settings/keys
#   OpenAI:   https://platform.openai.com/api-keys
#   Gemini:   https://aistudio.google.com/apikeys
#   DeepSeek: https://platform.deepseek.com/api_keys

# AI permission tier: readonly, write, shell, privileged
# Controls what AI tools can do without explicit approval.
# Default: shell (AI can read, write, and run commands)
auto_approve_tier = "shell"

# Command to launch for AI agent shell sessions (SPC a a)
editor = "claude"

# Claude API configuration
# api_key is read from ANTHROPIC_API_KEY env var (preferred)
# model = "claude-sonnet-4-20250514"

# Shell command to retrieve API key from a secrets manager.
# Stdout is trimmed and used as the key. Precedence: env var > command > literal.
# api_key_command = "pass show ai/anthropic-api-key"

# OpenAI API configuration
# api_key is read from OPENAI_API_KEY env var
# model = "gpt-4o"
# base_url = "https://api.openai.com/v1"

# Ollama configuration (local models)
# model = "llama3"
# base_url = "http://localhost:11434"

# DeepSeek configuration
# provider = "deepseek"
# model = "deepseek-chat"
# api_key is read from DEEPSEEK_API_KEY env var

[org]
# Directories and files to include in the agenda view.
# Use :agenda-add <path> / :agenda-remove <path> to manage.
# agenda_files = ["~/org", "~/work/notes"]

[collaboration]
# State server address for collaborative editing
# server_address = "127.0.0.1:9473"

# Automatically connect to state server on startup
# auto_connect = false

# Automatically share new file buffers when connected
# auto_share = false

# Seconds between reconnection attempts
# reconnect_interval_secs = 5

# Display name for collaborative edits (shown to peers)
# user_name = ""

# Pre-shared key for mutual authentication (HMAC-SHA256).
# Both server and all clients must use the same key.
# Prefer psk_command over psk to avoid storing secrets in plaintext.
# psk_command = "pass show mae/collab-psk"
# psk = "my-secret-key"

# KB sync mode: "on_save" (auto-sync on node edit) or "manual" (explicit :kb-sync)
# kb_sync_mode = "on_save"

[agents]
# Auto-write .mcp.json to project root on first shell spawn
auto_mcp_json = true

# Auto-configure agent tool approval settings
auto_approve_tools = true

# [performance]
# Line count threshold for viewport-local syntax highlighting
# large_file_lines = 5000
# Character count above which rendering features degrade (so-long pattern)
# degrade_threshold_chars = 500000
# Max line length before degradation
# degrade_threshold_line_length = 10000
# Milliseconds to debounce syntax reparse after edits
# syntax_reparse_debounce_ms = 50
