version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
    groups:
      rust-dependencies:
        patterns: ["*"]
    ignore:
      # sha2 0.11 uses hybrid-array (drops LowerHex trait, breaks 10+ callsites)
      # and is incompatible with hmac 0.12. Revisit when hmac 0.13+ is stable.
      - dependency-name: "sha2"
        versions: [">=0.11"]
      # ndarray 0.17 is incompatible with cozo 0.7 (which vendors ndarray 0.15).
      # Revisit when cozo upgrades its ndarray dependency.
      - dependency-name: "ndarray"
        versions: [">=0.16"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps):"
    groups:
      ci-dependencies:
        patterns: ["*"]
