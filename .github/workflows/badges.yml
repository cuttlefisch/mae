name: Badges

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  update:
    name: update badges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libfontconfig1-dev libfreetype6-dev

      - name: Count tests
        id: tests
        run: |
          OUTPUT=$(cargo test --workspace --features gui 2>&1) || true
          TOTAL=$(echo "$OUTPUT" | grep -oP '\d+ passed' | awk '{s+=$1} END {print s}')
          FORMATTED=$(printf "%'d" "${TOTAL:-0}")
          echo "count=$FORMATTED" >> $GITHUB_OUTPUT

      - name: Count lines of code
        id: loc
        run: |
          cargo install tokei --locked 2>/dev/null || true
          JSON=$(tokei crates/ shared/ daemon/src/ modules/ -t Rust,Scheme,TOML -o json)
          CODE=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['Total']['code'])")
          echo "count=~$((CODE / 1000))k" >> $GITHUB_OUTPUT

      - name: Validate badge config
        run: |
          if [ -z "${{ secrets.MAE_BADGE_TOKEN }}" ]; then
            echo "::warning::MAE_BADGE_TOKEN secret is not set — skipping badge updates"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
          if [ -z "${{ vars.MAE_BADGE_GIST }}" ]; then
            echo "::warning::MAE_BADGE_GIST variable is not set — skipping badge updates"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        id: badge_check

      - name: Update test badge
        if: steps.badge_check.outputs.skip != 'true'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.MAE_BADGE_TOKEN }}
          gistID: ${{ vars.MAE_BADGE_GIST }}
          filename: mae-tests.json
          label: tests
          message: "${{ steps.tests.outputs.count }} passing"
          color: brightgreen

      - name: Update LOC badge
        if: steps.badge_check.outputs.skip != 'true'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.MAE_BADGE_TOKEN }}
          gistID: ${{ vars.MAE_BADGE_GIST }}
          filename: mae-loc.json
          label: lines of code
          message: "${{ steps.loc.outputs.count }}"
          color: informational
