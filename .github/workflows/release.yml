name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for changelog

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2

      - name: Build static binary + manual KB + daemon
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --package mae
          cargo build --release --target x86_64-unknown-linux-musl --package mae-state-server
          cargo build --release --bin build-manual-kb
          ./target/release/build-manual-kb assets/mae-manual.cozo
          cd daemon && cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p dist/mae-pkg
          cp target/x86_64-unknown-linux-musl/release/mae dist/mae-pkg/mae
          cp target/x86_64-unknown-linux-musl/release/mae-state-server dist/mae-pkg/mae-state-server
          cp daemon/target/release/mae-daemon dist/mae-pkg/mae-daemon
          chmod +x dist/mae-pkg/mae dist/mae-pkg/mae-state-server dist/mae-pkg/mae-daemon
          cp -r assets/mae-manual.cozo dist/mae-pkg/mae-manual.cozo
          cp -r modules dist/mae-pkg/modules
          cp assets/sample-config.toml dist/mae-pkg/sample-config.toml
          cp assets/daemon-config.toml dist/mae-pkg/daemon-config.toml
          cp assets/mae-daemon.service dist/mae-pkg/mae-daemon.service
          tar czf dist/mae-linux-x86_64.tar.gz -C dist/mae-pkg .

      - uses: actions/upload-artifact@v7
        with:
          name: mae-linux-x86_64
          path: dist/mae-linux-x86_64.tar.gz

  build-linux-gui:
    name: Build linux-x86_64-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libfontconfig1-dev libfreetype6-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build GUI binary + manual KB
        run: |
          cargo build --release --features gui --package mae
          cargo build --release --bin build-manual-kb
          ./target/release/build-manual-kb assets/mae-manual.cozo

      - name: Build AppImage
        run: |
          # Set up AppDir structure
          mkdir -p dist/MAE.AppDir/usr/bin
          mkdir -p dist/MAE.AppDir/usr/share/applications
          mkdir -p dist/MAE.AppDir/usr/share/icons/hicolor/scalable/apps
          mkdir -p dist/MAE.AppDir/usr/share/mae
          cp target/release/mae dist/MAE.AppDir/usr/bin/mae
          chmod +x dist/MAE.AppDir/usr/bin/mae
          cp assets/mae.desktop dist/MAE.AppDir/usr/share/applications/mae.desktop
          cp assets/mae.desktop dist/MAE.AppDir/mae.desktop
          cp assets/mae.svg dist/MAE.AppDir/usr/share/icons/hicolor/scalable/apps/mae.svg
          cp assets/mae.svg dist/MAE.AppDir/mae.svg
          # Bundle manual KB and modules inside AppImage
          cp -r assets/mae-manual.cozo dist/MAE.AppDir/usr/share/mae/mae-manual.cozo
          cp -r modules dist/MAE.AppDir/usr/share/mae/modules
          cp assets/sample-config.toml dist/MAE.AppDir/usr/share/mae/sample-config.toml

          # AppRun entry point — sets env vars so bundled assets are found
          cat > dist/MAE.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          export MAE_MANUAL_PATH="${HERE}/usr/share/mae/mae-manual.cozo"
          export MAE_MODULES_PATH="${HERE}/usr/share/mae/modules"
          exec "${HERE}/usr/bin/mae" --gui "$@"
          APPRUN
          chmod +x dist/MAE.AppDir/AppRun

          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Build AppImage (--appimage-extract-and-run avoids FUSE requirement in CI)
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run dist/MAE.AppDir dist/mae-linux-x86_64-gui.AppImage

      - uses: actions/upload-artifact@v7
        with:
          name: mae-linux-x86_64-gui
          path: dist/mae-linux-x86_64-gui.AppImage

  build-macos-arm:
    name: Build macos-aarch64
    runs-on: macos-latest  # Apple Silicon M-series
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build TUI binary + state server + daemon + manual KB
        run: |
          cargo build --release --package mae --package mae-state-server
          cp target/release/mae target/release/mae-tui
          cargo build --release --bin build-manual-kb
          ./target/release/build-manual-kb assets/mae-manual.cozo
          cd daemon && cargo build --release

      - name: Build GUI binary
        run: cargo build --release --features gui --package mae

      - name: Create .app bundle
        run: |
          mkdir -p dist
          APP="dist/MAE.app/Contents/MacOS"
          RES="dist/MAE.app/Contents/Resources"
          mkdir -p "$APP" "$RES"

          cp target/release/mae "$APP/mae"
          chmod +x "$APP/mae"

          # Bundle manual KB and modules inside .app
          cp -r assets/mae-manual.cozo "$RES/mae-manual.cozo"
          cp -r modules "$RES/modules"
          cp assets/sample-config.toml "$RES/sample-config.toml"

          # Create launcher script that passes --gui + sets asset paths
          cat > "$APP/MAE" << 'LAUNCHER'
          #!/bin/bash
          SELF="$(dirname "$0")"
          RES="$SELF/../Resources"
          export MAE_MANUAL_PATH="$RES/mae-manual.cozo"
          export MAE_MODULES_PATH="$RES/modules"
          exec "$SELF/mae" --gui "$@"
          LAUNCHER
          chmod +x "$APP/MAE"

          # Convert SVG to ICNS (macOS icon format)
          # Use sips + iconutil with a PNG intermediary
          if command -v rsvg-convert &>/dev/null; then
            rsvg-convert -w 1024 -h 1024 assets/mae.svg -o /tmp/mae_1024.png
          else
            # Fallback: use sips with the PNG screenshot as icon source
            cp assets/mae-screenshot.png /tmp/mae_1024.png
          fi
          mkdir -p /tmp/mae.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size /tmp/mae_1024.png --out "/tmp/mae.iconset/icon_${size}x${size}.png" >/dev/null 2>&1
            double=$((size * 2))
            sips -z $double $double /tmp/mae_1024.png --out "/tmp/mae.iconset/icon_${size}x${size}@2x.png" >/dev/null 2>&1
          done
          iconutil -c icns -o "$RES/mae.icns" /tmp/mae.iconset 2>/dev/null || true

          # Info.plist
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "dist/MAE.app/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>MAE</string>
            <key>CFBundleDisplayName</key>
            <string>Modern AI Editor</string>
            <key>CFBundleIdentifier</key>
            <string>com.cuttlefisch.mae</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>MAE</string>
            <key>CFBundleIconFile</key>
            <string>mae</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeName</key>
                <string>Text File</string>
                <key>CFBundleTypeRole</key>
                <string>Editor</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>public.plain-text</string>
                  <string>public.source-code</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

          # Also produce a TUI-only tarball (includes state server, modules, manual KB)
          mkdir -p dist/mae-tui-pkg
          cp target/release/mae-tui dist/mae-tui-pkg/mae
          cp target/release/mae-state-server dist/mae-tui-pkg/mae-state-server
          cp daemon/target/release/mae-daemon dist/mae-tui-pkg/mae-daemon
          chmod +x dist/mae-tui-pkg/mae dist/mae-tui-pkg/mae-state-server dist/mae-tui-pkg/mae-daemon
          cp -r assets/mae-manual.cozo dist/mae-tui-pkg/mae-manual.cozo
          cp -r modules dist/mae-tui-pkg/modules
          cp assets/sample-config.toml dist/mae-tui-pkg/sample-config.toml
          cp assets/daemon-config.toml dist/mae-tui-pkg/daemon-config.toml
          tar czf dist/mae-macos-aarch64-tui.tar.gz -C dist/mae-tui-pkg .

          # Zip the .app bundle + state server (ditto preserves macOS metadata/resource forks)
          # Both MAE.app and mae-state-server go in the zip so users get everything in one download
          mkdir -p dist/mae-gui-pkg
          cp -R dist/MAE.app dist/mae-gui-pkg/MAE.app
          cp target/release/mae-state-server dist/mae-gui-pkg/mae-state-server
          chmod +x dist/mae-gui-pkg/mae-state-server
          cd dist && ditto -c -k --sequesterRsrc mae-gui-pkg MAE-macos-aarch64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: mae-macos-aarch64
          path: |
            dist/MAE-macos-aarch64.zip
            dist/mae-macos-aarch64-tui.tar.gz

  release:
    name: Publish release
    needs: [build-linux, build-linux-gui, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        run: |
          cargo install git-cliff
          git cliff --current --output CHANGELOG-release.md
          cat >> CHANGELOG-release.md << 'FOOTER'

          ---

          ## Download Guide

          | Platform | File | Contents |
          |----------|------|----------|
          | **macOS GUI** | `MAE-macos-aarch64.zip` | `MAE.app` (bundled) + `mae-state-server` (collab) |
          | **macOS TUI** | `mae-macos-aarch64-tui.tar.gz` | `mae` + `mae-state-server` + `mae-daemon` + modules + manual KB |
          | **Linux GUI** | `mae-linux-x86_64-gui.AppImage` | Self-contained AppImage (modules + manual KB bundled) |
          | **Linux TUI** | `mae-linux-x86_64.tar.gz` | `mae` (static musl) + `mae-state-server` + `mae-daemon` + modules + manual KB |

          All packages include the built-in help system (860+ KB nodes) and doom-style keybindings.

          ## After Installation

          **AppImage (Linux GUI):** Just run it — all assets are bundled inside.

          **Tarball (Linux/macOS TUI):** Extract and run from the extracted directory:
          ```bash
          tar xzf mae-*.tar.gz -C ~/mae && ~/mae/mae
          ```
          Or install to `~/.local`:
          ```bash
          mkdir -p ~/.local/bin ~/.local/share/mae
          cp mae mae-state-server ~/.local/bin/
          cp -r modules mae-manual.cozo ~/.local/share/mae/
          ```

          **macOS (.app bundle):** The app is unsigned. Before first launch, either:
          - **Right-click** → **Open** → click **Open** in the dialog (easiest), or:
          - Terminal: `xattr -c /path/to/MAE.app`

          **macOS state server:** Move `mae-state-server` to a directory in your `$PATH`:
          ```bash
          cp mae-state-server /usr/local/bin/
          ```

          **First launch:** MAE runs a setup wizard — choose your AI provider, model, API key, and theme.

          **Guided setup:**
          - `:help tutorial:ai-setup` — step-by-step AI configuration (Claude/OpenAI/Gemini/DeepSeek)
          - `:help tutorial:collab-setup` — multi-user collaborative editing

          **Verify:** `:ai-ping` (AI connectivity) and `:collab-doctor` (collaboration diagnostics)
          FOOTER

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG-release.md
          files: |
            dist/mae-linux-x86_64.tar.gz
            dist/mae-linux-x86_64-gui.AppImage
            dist/MAE-macos-aarch64.zip
            dist/mae-macos-aarch64-tui.tar.gz
          fail_on_unmatched_files: true
