name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for changelog

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools clang libfontconfig1-dev libfreetype6-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build GUI binary (glibc) + services (musl) + manual KB + daemon
        run: |
          cargo build --release --features gui --package mae
          cargo build --release --target x86_64-unknown-linux-musl --package mae-mcp
          cargo build --release --bin build-manual-kb
          ./target/release/build-manual-kb assets/mae-manual.cozo
          # Strip sled lock files from manual KB
          find assets/mae-manual.cozo -name "*.lock" -delete 2>/dev/null || true
          cd daemon && cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare artifact
        run: |
          mkdir -p dist/mae-pkg
          cp target/release/mae dist/mae-pkg/mae
          cp target/x86_64-unknown-linux-musl/release/mae-mcp-shim dist/mae-pkg/mae-mcp-shim
          cp daemon/target/x86_64-unknown-linux-musl/release/mae-daemon dist/mae-pkg/mae-daemon
          chmod +x dist/mae-pkg/mae dist/mae-pkg/mae-mcp-shim dist/mae-pkg/mae-daemon
          cp -r assets/mae-manual.cozo dist/mae-pkg/mae-manual.cozo
          cp assets/mae-manual.cozo.sha256 dist/mae-pkg/mae-manual.cozo.sha256
          cp -r modules dist/mae-pkg/modules
          cp assets/sample-config.toml dist/mae-pkg/sample-config.toml
          cp assets/daemon-config.toml dist/mae-pkg/daemon-config.toml
          cp assets/mae-daemon.service dist/mae-pkg/mae-daemon.service
          cp assets/install.sh dist/mae-pkg/install.sh
          cp assets/com.cuttlefisch.mae-daemon.plist dist/mae-pkg/com.cuttlefisch.mae-daemon.plist
          chmod +x dist/mae-pkg/install.sh
          tar czf dist/mae-linux-x86_64.tar.gz -C dist/mae-pkg .

      - uses: actions/upload-artifact@v7
        with:
          name: mae-linux-x86_64
          path: dist/mae-linux-x86_64.tar.gz

  build-linux-gui:
    name: Build linux-x86_64-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libfontconfig1-dev libfreetype6-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build GUI binary + manual KB
        run: |
          cargo build --release --features gui --package mae
          cargo build --release --bin build-manual-kb
          ./target/release/build-manual-kb assets/mae-manual.cozo
          # Strip sled lock files from manual KB
          find assets/mae-manual.cozo -name "*.lock" -delete 2>/dev/null || true

      - name: Build AppImage
        run: |
          # Set up AppDir structure
          mkdir -p dist/MAE.AppDir/usr/bin
          mkdir -p dist/MAE.AppDir/usr/share/applications
          mkdir -p dist/MAE.AppDir/usr/share/icons/hicolor/scalable/apps
          mkdir -p dist/MAE.AppDir/usr/share/mae
          cp target/release/mae dist/MAE.AppDir/usr/bin/mae
          chmod +x dist/MAE.AppDir/usr/bin/mae
          cp assets/mae.desktop dist/MAE.AppDir/usr/share/applications/mae.desktop
          cp assets/mae.desktop dist/MAE.AppDir/mae.desktop
          cp assets/mae.svg dist/MAE.AppDir/usr/share/icons/hicolor/scalable/apps/mae.svg
          cp assets/mae.svg dist/MAE.AppDir/mae.svg
          # Bundle manual KB and modules inside AppImage
          cp -r assets/mae-manual.cozo dist/MAE.AppDir/usr/share/mae/mae-manual.cozo
          cp -r modules dist/MAE.AppDir/usr/share/mae/modules
          cp assets/sample-config.toml dist/MAE.AppDir/usr/share/mae/sample-config.toml

          # AppRun entry point — sets env vars so bundled assets are found
          cat > dist/MAE.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          export MAE_MANUAL_PATH="${HERE}/usr/share/mae/mae-manual.cozo"
          export MAE_MODULES_PATH="${HERE}/usr/share/mae/modules"
          exec "${HERE}/usr/bin/mae" --gui "$@"
          APPRUN
          chmod +x dist/MAE.AppDir/AppRun

          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Build AppImage (--appimage-extract-and-run avoids FUSE requirement in CI)
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run dist/MAE.AppDir dist/mae-linux-x86_64-gui.AppImage

      - uses: actions/upload-artifact@v7
        with:
          name: mae-linux-x86_64-gui
          path: dist/mae-linux-x86_64-gui.AppImage

  build-macos-arm:
    name: Build macos-aarch64
    runs-on: macos-latest  # Apple Silicon M-series
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build shim + daemon + manual KB
        run: |
          cargo build --release --package mae-mcp
          cargo build --release --bin build-manual-kb
          ./target/release/build-manual-kb assets/mae-manual.cozo
          # Strip sled lock files — quarantine on macOS prevents reopening
          find assets/mae-manual.cozo -name "*.lock" -delete 2>/dev/null || true
          cd daemon && cargo build --release

      - name: Build GUI binary
        run: cargo build --release --features gui --package mae

      - name: Create .app bundle
        run: |
          mkdir -p dist
          APP="dist/MAE.app/Contents/MacOS"
          RES="dist/MAE.app/Contents/Resources"
          mkdir -p "$APP" "$RES"

          cp target/release/mae "$APP/mae"
          chmod +x "$APP/mae"

          # Bundle manual KB and modules inside .app
          cp -r assets/mae-manual.cozo "$RES/mae-manual.cozo"
          cp -r modules "$RES/modules"
          cp assets/sample-config.toml "$RES/sample-config.toml"

          # Create launcher script that passes --gui + sets asset paths
          cat > "$APP/MAE" << 'LAUNCHER'
          #!/bin/bash
          SELF="$(dirname "$0")"
          RES="$SELF/../Resources"
          export MAE_MANUAL_PATH="$RES/mae-manual.cozo"
          export MAE_MODULES_PATH="$RES/modules"
          exec "$SELF/mae" --gui "$@"
          LAUNCHER
          chmod +x "$APP/MAE"

          # Convert SVG to ICNS (macOS icon format)
          # Use sips + iconutil with a PNG intermediary
          if command -v rsvg-convert &>/dev/null; then
            rsvg-convert -w 1024 -h 1024 assets/mae.svg -o /tmp/mae_1024.png
          else
            # Fallback: use sips with the PNG screenshot as icon source
            cp assets/mae-screenshot.png /tmp/mae_1024.png
          fi
          mkdir -p /tmp/mae.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size /tmp/mae_1024.png --out "/tmp/mae.iconset/icon_${size}x${size}.png" >/dev/null 2>&1
            double=$((size * 2))
            sips -z $double $double /tmp/mae_1024.png --out "/tmp/mae.iconset/icon_${size}x${size}@2x.png" >/dev/null 2>&1
          done
          iconutil -c icns -o "$RES/mae.icns" /tmp/mae.iconset 2>/dev/null || true

          # Info.plist
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "dist/MAE.app/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>MAE</string>
            <key>CFBundleDisplayName</key>
            <string>Modern AI Editor</string>
            <key>CFBundleIdentifier</key>
            <string>com.cuttlefisch.mae</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>MAE</string>
            <key>CFBundleIconFile</key>
            <string>mae</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeName</key>
                <string>Text File</string>
                <key>CFBundleTypeRole</key>
                <string>Editor</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>public.plain-text</string>
                  <string>public.source-code</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

          # CLI tarball (consumed by the Homebrew formula): the GUI-capable
          # `mae` binary. It launches the GUI on a desktop session and falls
          # back to the terminal UI over SSH / on a tty / headless (or with
          # `-nw`), so a single binary serves both. Plus services, modules,
          # manual KB, and configs.
          mkdir -p dist/mae-cli-pkg
          cp target/release/mae dist/mae-cli-pkg/mae
          cp target/release/mae-mcp-shim dist/mae-cli-pkg/mae-mcp-shim
          cp daemon/target/release/mae-daemon dist/mae-cli-pkg/mae-daemon
          chmod +x dist/mae-cli-pkg/mae dist/mae-cli-pkg/mae-mcp-shim dist/mae-cli-pkg/mae-daemon
          cp -r assets/mae-manual.cozo dist/mae-cli-pkg/mae-manual.cozo
          cp assets/mae-manual.cozo.sha256 dist/mae-cli-pkg/mae-manual.cozo.sha256
          cp -r modules dist/mae-cli-pkg/modules
          cp assets/sample-config.toml dist/mae-cli-pkg/sample-config.toml
          cp assets/daemon-config.toml dist/mae-cli-pkg/daemon-config.toml
          cp assets/install.sh dist/mae-cli-pkg/install.sh
          cp assets/com.cuttlefisch.mae-daemon.plist dist/mae-cli-pkg/com.cuttlefisch.mae-daemon.plist
          chmod +x dist/mae-cli-pkg/install.sh
          tar czf dist/mae-macos-aarch64.tar.gz -C dist/mae-cli-pkg .

          # Build complete macOS GUI package — users unzip → ./install.sh
          mkdir -p dist/mae-gui-pkg
          cp -R dist/MAE.app dist/mae-gui-pkg/MAE.app
          # All binaries (install.sh expects these by name). The GUI-capable
          # `mae` is used for the CLI here too (auto-detects display; -nw forces
          # terminal mode), matching the formula.
          cp target/release/mae dist/mae-gui-pkg/mae
          cp target/release/mae-mcp-shim dist/mae-gui-pkg/mae-mcp-shim
          cp daemon/target/release/mae-daemon dist/mae-gui-pkg/mae-daemon
          chmod +x dist/mae-gui-pkg/mae dist/mae-gui-pkg/mae-mcp-shim dist/mae-gui-pkg/mae-daemon
          # All assets needed by install.sh
          cp -r assets/mae-manual.cozo dist/mae-gui-pkg/mae-manual.cozo
          cp assets/mae-manual.cozo.sha256 dist/mae-gui-pkg/mae-manual.cozo.sha256
          cp -r modules dist/mae-gui-pkg/modules
          cp assets/sample-config.toml dist/mae-gui-pkg/sample-config.toml
          cp assets/daemon-config.toml dist/mae-gui-pkg/daemon-config.toml
          cp assets/mae-daemon.service dist/mae-gui-pkg/mae-daemon.service
          cp assets/com.cuttlefisch.mae-daemon.plist dist/mae-gui-pkg/com.cuttlefisch.mae-daemon.plist
          cp assets/install.sh dist/mae-gui-pkg/install.sh
          chmod +x dist/mae-gui-pkg/install.sh
          cd dist && ditto -c -k --sequesterRsrc mae-gui-pkg MAE-macos-aarch64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: mae-macos-aarch64
          path: |
            dist/MAE-macos-aarch64.zip
            dist/mae-macos-aarch64.tar.gz

  release:
    name: Publish release
    needs: [build-linux, build-linux-gui, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        run: |
          cargo install git-cliff
          git cliff --current --output CHANGELOG-release.md
          cat >> CHANGELOG-release.md << 'FOOTER'

          ---

          ## Download Guide

          | Platform | File | Contents |
          |----------|------|----------|
          | **macOS app** | `MAE-macos-aarch64.zip` | `MAE.app` + `mae-daemon` + `mae-mcp-shim` + installer |
          | **macOS CLI** | `mae-macos-aarch64.tar.gz` | GUI-capable `mae` (GUI by default; `-nw` for terminal) + all services + modules + manual KB + configs |
          | **Linux GUI** | `mae-linux-x86_64-gui.AppImage` | Self-contained AppImage (modules + manual KB bundled) |
          | **Linux** | `mae-linux-x86_64.tar.gz` | `mae` (GUI-enabled) + all services (static musl) + modules + manual KB + systemd units |

          All packages include the built-in help system (860+ KB nodes) and doom-style keybindings.

          ## Installation

          **macOS (Homebrew — recommended):**
          ```bash
          brew tap cuttlefisch/mae
          brew install mae                    # CLI + daemon + modules + manual KB
          brew install --cask mae             # optional: GUI .app bundle
          brew services start mae             # optional: background daemon
          ```

          **AppImage (Linux GUI):** Just run it — all assets are bundled inside.

          **Everything else:** Extract and run the installer:
          ```bash
          # Linux tarball
          mkdir ~/mae && tar xzf mae-linux-*.tar.gz -C ~/mae
          cd ~/mae && ./install.sh

          # macOS GUI (zip)
          unzip MAE-macos-aarch64.zip -d ~/mae
          cd ~/mae && ./install.sh

          # macOS TUI (tarball)
          mkdir ~/mae && tar xzf mae-macos-*.tar.gz -C ~/mae
          cd ~/mae && ./install.sh
          ```

          The installer handles everything: binaries to `~/.local/bin/`, modules, manual KB, config scaffolding, `.app` bundle to `~/Applications` (macOS), systemd units (Linux), and launchd agents (macOS).

          Use `./install.sh /usr/local` for a system-wide install. Use `./install.sh --uninstall` to remove.

          **First launch:** MAE runs a setup wizard — choose your AI provider, model, API key, and theme.

          **Learn more:** `:help tutorial:getting-started`, `:help tutorial:ai-setup`, `:help tutorial:collab-setup`

          **Verify:** `:ai-ping` (AI connectivity) and `:collab-doctor` (collaboration diagnostics)
          FOOTER

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG-release.md
          files: |
            dist/mae-linux-x86_64.tar.gz
            dist/mae-linux-x86_64-gui.AppImage
            dist/MAE-macos-aarch64.zip
            dist/mae-macos-aarch64.tar.gz
          fail_on_unmatched_files: true
          token: ${{ secrets.RELEASE_PAT }}

  update-homebrew:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        id: sha
        run: |
          MAC_SHA=$(sha256sum dist/mae-macos-aarch64.tar.gz | awk '{print $1}')
          GUI_SHA=$(sha256sum dist/MAE-macos-aarch64.zip | awk '{print $1}')
          LINUX_SHA=$(sha256sum dist/mae-linux-x86_64.tar.gz | awk '{print $1}')
          echo "mac=$MAC_SHA" >> "$GITHUB_OUTPUT"
          echo "gui=$GUI_SHA" >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX_SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/cuttlefisch/homebrew-mae.git" tap
          cd tap

          # Update Formula
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/mae.rb

          # Point the macOS formula at the GUI-capable CLI tarball (renamed from
          # the old `-tui` artifact, which is no longer produced). The binary
          # launches the GUI by default and falls back to the terminal UI over
          # SSH/tty/headless. Idempotent once renamed. Kept in this step so the
          # formula url stays in sync with the artifact name at release time.
          sed -i "s#mae-macos-aarch64-tui\.tar\.gz#mae-macos-aarch64.tar.gz#" Formula/mae.rb

          # Update checksums in Formula (on_macos block first, then on_linux)
          # Use awk to replace sha256 lines in order
          awk -v mac="${{ steps.sha.outputs.mac }}" \
              -v linux="${{ steps.sha.outputs.linux }}" \
              'BEGIN{in_mac=0; in_lin=0}
               /on_macos/{in_mac=1}
               /on_linux/{in_lin=1; in_mac=0}
               /sha256/ && in_mac && !mac_done {sub(/sha256 ".*"/, "sha256 \""mac"\""); mac_done=1}
               /sha256/ && in_lin && !lin_done {sub(/sha256 ".*"/, "sha256 \""linux"\""); lin_done=1}
               {print}' Formula/mae.rb > Formula/mae.rb.tmp && mv Formula/mae.rb.tmp Formula/mae.rb

          # Update Cask
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/mae.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.gui }}\"/" Casks/mae.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "mae ${VERSION}"
          git push
