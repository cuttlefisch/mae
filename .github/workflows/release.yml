name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for changelog

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl --package mae

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/mae dist/mae-linux-x86_64
          chmod +x dist/mae-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: mae-linux-x86_64
          path: dist/mae-linux-x86_64

  build-linux-gui:
    name: Build linux-x86_64-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libfontconfig1-dev libfreetype6-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build GUI binary
        run: cargo build --release --features gui --package mae

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/release/mae dist/mae-linux-x86_64-gui
          chmod +x dist/mae-linux-x86_64-gui

      - uses: actions/upload-artifact@v4
        with:
          name: mae-linux-x86_64-gui
          path: dist/mae-linux-x86_64-gui

  build-macos-arm:
    name: Build macos-aarch64
    runs-on: macos-latest  # Apple Silicon M-series
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build TUI binary
        run: cargo build --release --package mae

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/release/mae dist/mae-macos-aarch64
          chmod +x dist/mae-macos-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: mae-macos-aarch64
          path: dist/mae-macos-aarch64

  release:
    name: Publish release
    needs: [build-linux, build-linux-gui, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate code map
        run: |
          cargo install --locked --path tools/code-map
          code-map --workspace-root .
        continue-on-error: true

      - name: Commit fresh code-map to main
        run: |
          if git diff --quiet docs/CODE_MAP.md docs/CODE_MAP.json 2>/dev/null; then
            echo "Code map unchanged, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/CODE_MAP.md docs/CODE_MAP.json
            git commit -m "docs: update code-map for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi
        continue-on-error: true

      - name: Generate changelog
        run: |
          cargo install git-cliff
          git cliff --current --output CHANGELOG-release.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG-release.md
          files: |
            dist/mae-linux-x86_64
            dist/mae-linux-x86_64-gui
            dist/mae-macos-aarch64
          fail_on_unmatched_files: true
