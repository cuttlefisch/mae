name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for changelog

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl --package mae

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/mae dist/mae-linux-x86_64
          chmod +x dist/mae-linux-x86_64

      - name: Generate changelog
        run: |
          cargo install git-cliff
          git cliff --current --output CHANGELOG-release.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG-release.md
          files: dist/mae-linux-x86_64
          fail_on_unmatched_files: true
