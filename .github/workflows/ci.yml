name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.toolchain }} / ${{ matrix.step }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
        step: [check, test, clippy, fmt]
        exclude:
          # Only run fmt on stable — it's the same either way
          - toolchain: nightly
            step: fmt
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        if: matrix.step == 'check'
        run: cargo check --workspace --all-targets --exclude mae-gui

      - name: cargo test
        if: matrix.step == 'test'
        run: cargo test --workspace --exclude mae-gui

      - name: cargo clippy
        if: matrix.step == 'clippy'
        run: cargo clippy --workspace --all-targets --exclude mae-gui -- -D warnings

      - name: cargo fmt
        if: matrix.step == 'fmt'
        run: cargo fmt --all --check

  # E2E smoke test: build TUI binary and validate init.scm loads without errors.
  e2e:
    name: e2e / check-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build TUI binary
        run: cargo build --release --workspace --exclude mae-gui
      - name: Validate init.scm
        run: ./target/release/mae --check-config
