name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.toolchain }} / ${{ matrix.step }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
        step: [check, test, clippy, fmt]
        exclude:
          # Only run fmt on stable — it's the same either way
          - toolchain: nightly
            step: fmt
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        if: matrix.step == 'check'
        run: cargo check --workspace --all-targets --exclude mae-gui --exclude mae-test-fixtures

      - name: cargo test
        if: matrix.step == 'test'
        run: |
          cargo test --workspace --exclude mae-gui --exclude mae-test-fixtures
          cargo test --doc --workspace --exclude mae-gui --exclude mae-test-fixtures

      - name: cargo clippy
        if: matrix.step == 'clippy'
        run: cargo clippy --workspace --all-targets --exclude mae-gui --exclude mae-test-fixtures -- -D warnings

      - name: cargo fmt
        if: matrix.step == 'fmt'
        run: cargo fmt --all --check

  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # E2E smoke test: build TUI binary and validate init.scm loads without errors.
  e2e:
    name: e2e / check-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build TUI binary
        run: cargo build --release --workspace --exclude mae-gui --exclude mae-test-fixtures
      - name: Validate init.scm
        run: ./target/release/mae --check-config

  gui-build:
    name: gui / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libfontconfig1-dev libfreetype6-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build GUI binary
        run: cargo build --release --features gui --package mae

  container-smoke:
    name: container / smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and smoke-test container
        run: docker compose run --rm --build smoke

  container-new-user:
    name: container / new-user
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate new-user flow in clean container
        run: docker compose run --rm --build new-user

  e2e-package-install:
    name: e2e / package install
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build TUI binary
        run: cargo build --release --workspace --exclude mae-gui --exclude mae-test-fixtures
      - name: Declare test package in init.scm
        run: |
          mkdir -p ~/.config/mae
          cat > ~/.config/mae/init.scm <<'SCHEME'
          (package! "splash-themes" :source "github:cuttlefisch/mae-splash-themes")
          SCHEME
      - name: Run mae sync
        run: ./target/release/mae sync
      - name: Verify package installed
        run: test -f ~/.config/mae/packages/splash-themes/module.toml
      - name: Validate config loads
        run: ./target/release/mae --check-config
      - name: Verify lockfile
        run: test -f ~/.config/mae/packages.lock

  code-map:
    name: code-map freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check code-map freshness
        run: |
          make code-map
          if git diff --quiet docs/CODE_MAP.md docs/CODE_MAP.json; then
            echo "✅ Code map is up to date."
          else
            echo "❌ Code map is stale. Run 'make code-map' and commit before merging."
            git diff --stat docs/CODE_MAP.md docs/CODE_MAP.json
            exit 1
          fi

  badges:
    name: update badges
    runs-on: ubuntu-latest
    needs: [check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Count tests
        id: tests
        run: |
          OUTPUT=$(cargo test --workspace --exclude mae-gui --exclude mae-test-fixtures 2>&1)
          TOTAL=$(echo "$OUTPUT" | grep -oP '\d+ passed' | awk '{s+=$1} END {print s}')
          FORMATTED=$(printf "%'d" "$TOTAL")
          echo "count=$FORMATTED" >> $GITHUB_OUTPUT

      - name: Count lines of code
        id: loc
        run: |
          cargo install tokei --locked 2>/dev/null || true
          JSON=$(tokei crates/ modules/ scheme/ -t Rust,Scheme,TOML -o json)
          CODE=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['Total']['code'])")
          echo "count=~$((CODE / 1000))k" >> $GITHUB_OUTPUT

      - name: Validate badge config
        run: |
          if [ -z "${{ secrets.MAE_BADGE_TOKEN }}" ]; then
            echo "::warning::MAE_BADGE_TOKEN secret is not set — skipping badge updates"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
          if [ -z "${{ vars.MAE_BADGE_GIST }}" ]; then
            echo "::warning::MAE_BADGE_GIST variable is not set — skipping badge updates"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        id: badge_check

      - name: Update test badge
        if: steps.badge_check.outputs.skip != 'true'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.MAE_BADGE_TOKEN }}
          gistID: ${{ vars.MAE_BADGE_GIST }}
          filename: mae-tests.json
          label: tests
          message: "${{ steps.tests.outputs.count }} passing"
          color: brightgreen

      - name: Update LOC badge
        if: steps.badge_check.outputs.skip != 'true'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.MAE_BADGE_TOKEN }}
          gistID: ${{ vars.MAE_BADGE_GIST }}
          filename: mae-loc.json
          label: lines of code
          message: "${{ steps.loc.outputs.count }}"
          color: informational
