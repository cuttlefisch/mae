name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Harden dependency fetching against transient network flakes. The daemon's
  # iroh/hickory (QUIC P2P) deps occasionally trip cargo's HTTP/2 multiplexing
  # mid-fetch with "[16] Error in the HTTP2 framing layer" (curl CURLE_HTTP2),
  # failing an otherwise-clean `cargo build`. Force HTTP/1.1, retry transient
  # fetch errors, and use the git CLI (robust retry/resume) for any git deps.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  check:
    name: ${{ matrix.toolchain }} / ${{ matrix.step }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
        step: [test, clippy, fmt]
        exclude:
          # Only run fmt on stable — it's the same either way
          - toolchain: nightly
            step: fmt
    # Nightly is informational — occasionally exposes edge cases in upstream
    # dependencies (CozoDB, tree-sitter, etc.) before stable releases.
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Install GUI dependencies
        if: matrix.step != 'fmt'
        run: sudo apt-get update && sudo apt-get install -y clang libfontconfig1-dev libfreetype6-dev

      - uses: Swatinem/rust-cache@v2

      # Stable: release build (reused by e2e job via artifact upload).
      # Nightly: debug build (faster, no artifact needed).
      - name: cargo test
        if: matrix.step == 'test'
        timeout-minutes: 30
        run: |
          if [ "${{ matrix.toolchain }}" = "stable" ]; then
            cargo test --workspace --release --features gui
            cargo test --doc --workspace --release --features gui
          else
            # Nightly: CozoDB's sled backend triggers glibc
            # "malloc(): unaligned tcache chunk detected" (SIGABRT) on
            # nightly Rust. Exclude CozoDB-heavy integration test binaries
            # that crash the process. These tests pass on stable.
            cargo test --workspace --exclude mae
            cargo test -p mae --bins
            cargo test -p mae --test mcp_event_loop_integration
            # Skipped on nightly: kb_graph_validation, kb_lifecycle_e2e,
            # collab_tcp_e2e (all CozoDB or #[ignore])
            # collab_bridge_integration and collab_stress moved to daemon workspace
            cargo test --doc --workspace
          fi
      - name: cargo clippy
        if: matrix.step == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt
        if: matrix.step == 'fmt'
        run: cargo fmt --all --check

      # `cargo test --workspace --release --features gui` above already compiled
      # `mae` and `build-manual-kb` into target/release/ — so we run build-manual-kb
      # directly instead of the old `cargo build --bin build-manual-kb` (no
      # --features gui), which re-resolved features and recompiled the entire `mae`
      # crate from scratch to produce a binary that already existed (the waste this
      # removes, on the critical path that gates downstream artifact jobs).
      # The mae-mcp build stays: it's the only way the shim lands at
      # target/release/mae-mcp-shim, and it's cheap (mae-mcp is feature-independent
      # and already compiled by the test step — this just links the shim).
      - name: Build install artifacts (reuse test-compiled binaries)
        if: matrix.toolchain == 'stable' && matrix.step == 'test'
        run: |
          cargo build --release --package mae-mcp
          ./target/release/build-manual-kb assets/mae-manual.cozo

      - name: Stage editor artifacts
        if: matrix.toolchain == 'stable' && matrix.step == 'test'
        run: |
          mkdir -p /tmp/mae-artifacts
          cp target/release/mae /tmp/mae-artifacts/
          cp target/release/mae-mcp-shim /tmp/mae-artifacts/
          cp target/release/mae-agent /tmp/mae-artifacts/
          cp -r assets/mae-manual.cozo /tmp/mae-artifacts/
          cp assets/mae-manual.cozo.sha256 /tmp/mae-artifacts/

      - name: Upload editor artifacts
        if: matrix.toolchain == 'stable' && matrix.step == 'test'
        uses: actions/upload-artifact@v7
        with:
          name: mae-binary
          path: /tmp/mae-artifacts/
          retention-days: 1

  daemon:
    name: daemon / check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "daemon -> daemon/target"
      - name: clippy
        run: cd daemon && cargo clippy --all-targets -- -D warnings
      - name: test
        run: cd daemon && cargo test
        timeout-minutes: 5
      - name: fmt
        run: cd daemon && cargo fmt --check
      - name: Build release binary
        run: cd daemon && cargo build --release
      - name: Upload daemon binary
        uses: actions/upload-artifact@v7
        with:
          name: mae-daemon-binary
          path: daemon/target/release/mae-daemon
          retention-days: 1

  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  server-client:
    name: Server-Client Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Multi-client integration tests
        run: cargo test --package mae-mcp --lib -- --test-threads=1
        timeout-minutes: 5
      - name: KB WAL integration tests
        run: cargo test --package mae-kb --lib -- wal changelog sync --test-threads=1
        timeout-minutes: 3
      - name: File safety tests
        run: cargo test --package mae-core --lib -- content_hash file_lock --test-threads=1
        timeout-minutes: 3
      - name: Build daemon binary
        run: cd daemon && cargo build
      - name: Daemon collab tests
        run: cd daemon && cargo test -- --test-threads=1 --nocapture
        timeout-minutes: 10
        env:
          # MAE_TCP_E2E=1 un-skips network_e2e.rs (real-TCP daemon-spawn suite —
          # the only e2e for sync/resync). Each test spawns an XDG-isolated daemon,
          # so it composes with the in-process collab_e2e tests in this same run.
          MAE_TCP_E2E: "1"
          RUST_LOG: "mae_daemon=debug,mae_sync=debug,warn"
      - name: TCP E2E tests (PSK auth + KB protocol)
        run: |
          cargo test --package mae --test collab_tcp_e2e -- tcp_psk --ignored --test-threads=1 --nocapture
          cargo test --package mae --test collab_tcp_e2e -- tcp_kb --ignored --test-threads=1 --nocapture
          cargo test --package mae --test collab_tcp_e2e -- tcp_full_roundtrip --ignored --test-threads=1 --nocapture
          cargo test --package mae --test collab_tcp_e2e -- tcp_two_editors --ignored --test-threads=1 --nocapture
        timeout-minutes: 5
        env:
          MAE_TCP_E2E: "1"
          RUST_LOG: "mae_daemon=debug,warn"
      - name: Daemon-boundary e2e (real spawn / supervise / circuit-breaker)
        # Drives the editor's on-demand spawn → readiness → daemon/status →
        # watchdog-restart → circuit-breaker path against the REAL daemon built
        # above (ADR-035 #136). Skips elsewhere (no MAE_DAEMON_BIN); here the daemon
        # exists so it runs. The DaemonTestEnv harness reaps every spawn (no leaks).
        run: MAE_DAEMON_BIN="$(pwd)/daemon/target/debug/mae-daemon" cargo test -p mae --bin mae daemon_lifecycle_e2e -- --test-threads=1 --nocapture
        timeout-minutes: 5
      - name: KB lifecycle E2E (CozoDB)
        run: cargo test --package mae --test kb_lifecycle_e2e -- --ignored --test-threads=1 --nocapture
        timeout-minutes: 5
        env:
          MAE_KB_LIFECYCLE: "1"
      - name: Build manual KB
        run: cargo run --bin build-manual-kb -- /tmp/mae-manual.cozo
        timeout-minutes: 3
      - name: Daemon check-config
        run: cd daemon && cargo run -- --check-config
        timeout-minutes: 1
      # mDNS LAN-discovery round-trip (register → browse → resolve). Best-effort:
      # depends on multicast on the runner, which shared CI can't guarantee, so it's
      # `continue-on-error` — it gives live signal when it works but never gates the
      # build on multicast availability/timing. The deterministic parse-path tests
      # (build_discovered_peer_*) run unconditionally in the `check` job.
      - name: mDNS discovery round-trip (best-effort)
        run: cargo test --package mae --bin mae mdns_round_trip -- --nocapture
        continue-on-error: true
        timeout-minutes: 2
        env:
          MAE_MDNS_E2E: "1"
          RUST_LOG: "mae=debug,warn"

  containers:
    name: container / smoke + new-user
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and smoke-test container
        run: docker compose run --rm --build smoke
      - name: Validate new-user flow in clean container
        run: docker compose run --rm --build new-user

  # E2E validation: downloads pre-built binary from stable/test.
  # Falls back to local build if artifact not yet available.
  e2e:
    name: e2e / scheme + packages
    runs-on: ubuntu-latest
    needs: [check, daemon]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libfontconfig1-dev libfreetype6-dev iproute2
      - name: Download mae binary
        uses: actions/download-artifact@v8
        with:
          name: mae-binary
          path: /tmp/mae-dl
      - name: Install mae binary
        run: |
          mkdir -p target/release
          cp /tmp/mae-dl/mae target/release/mae
          cp /tmp/mae-dl/mae-agent target/release/mae-agent
          chmod +x target/release/mae target/release/mae-agent
      - name: mae-agent smoke check (binary runs, fails cleanly with no live socket)
        # A full live-process e2e (real `mae` + PSK handshake + `mae-agent --check`)
        # needs a real controlling tty (crossterm's raw-mode enable errors ENXIO
        # without one) and interacts with the first-run wizard even under a pty —
        # real, but nontrivial, infra to get right; scoped out of this pass (see
        # PR discussion). This step is deliberately narrower: it only proves the
        # compiled `mae-agent` binary starts, parses `--check`, and fails cleanly
        # (not a panic) when no socket is present — catching a build/link
        # regression or a crash-instead-of-clean-error regression in the
        # discovery path, which unit tests alone (mocked transport) can't catch.
        run: |
          set +e
          ./target/release/mae-agent --check --socket /tmp/mae-nonexistent-$$.sock
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "expected a nonzero exit for a nonexistent socket, got 0"
            exit 1
          fi
          echo "OK: mae-agent exited $code (clean failure, no panic)"
      - name: Download daemon binary
        uses: actions/download-artifact@v8
        with:
          name: mae-daemon-binary
          path: /tmp/daemon-dl
      - name: Install daemon binary
        run: |
          mkdir -p daemon/target/release
          cp /tmp/daemon-dl/mae-daemon daemon/target/release/mae-daemon
          chmod +x daemon/target/release/mae-daemon
      - name: Validate init.scm
        run: ./target/release/mae --check-config
      - name: Editor tests
        run: ./target/release/mae --test tests/editor/
      - name: CRDT tests
        run: ./target/release/mae --test tests/crdt/
      - name: Collab local tests
        run: ./target/release/mae --test tests/collab-local/
      - name: Trusted-peer mTLS e2e
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
        run: scripts/collab-mtls-e2e.sh
      - name: Per-KB membership e2e
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
        run: scripts/collab-membership-e2e.sh
      - name: E2E encrypted KB-sharing lifecycle (ADR-037 Phase 3d gate)
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
        run: scripts/collab-encrypted-e2e.sh
      - name: E2E §D3 removal+rotation (removed member can't read post-rotation content)
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
          MAE_E2E_REMOVAL: "1"
        run: scripts/collab-encrypted-e2e.sh
      - name: E2E ADR-040 owner identity rotation (rotated owner authors content, member converges)
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
          MAE_E2E_ROTATE: "1"
        run: scripts/collab-encrypted-e2e.sh
      - name: E2E ADR-040 recovery-key (lost member recovers via offline key, decrypts content)
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
          MAE_E2E_RECOVER: "1"
        run: scripts/collab-encrypted-e2e.sh
      - name: E2E ADR-025 P2P mesh (two daemons converge a KB over iroh, no hub)
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
        run: scripts/collab-p2p-mesh-e2e.sh
      - name: E2E ADR-043 P2P mesh + encryption (content sealed, daemons key-blind over the mesh)
        env:
          MAE_BIN: ${{ github.workspace }}/target/release/mae
          MAE_DAEMON_BIN: ${{ github.workspace }}/daemon/target/release/mae-daemon
          MAE_E2E_MESH: "1"
        run: scripts/collab-p2p-mesh-e2e.sh
      - name: Package install
        run: |
          mkdir -p ~/.config/mae
          cat > ~/.config/mae/init.scm <<'SCHEME'
          (package! "splash-themes" :source "github:cuttlefisch/mae-splash-themes")
          SCHEME
          ./target/release/mae sync
          test -f ~/.config/mae/packages/splash-themes/module.toml
          ./target/release/mae --check-config
          test -f ~/.config/mae/packages.lock

  scheme-runtime:
    name: scheme / R7RS compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: R7RS compliance tests
        run: cargo test -p mae-scheme --test r7rs_compliance -- --nocapture
        timeout-minutes: 10
      - name: Scheme torture tests
        run: cargo test -p mae-scheme --test scheme_torture -- --nocapture
        timeout-minutes: 5
      - name: Scheme benchmark tests
        run: cargo test -p mae-scheme --test scheme_benchmarks -- --nocapture
        timeout-minutes: 10
      - name: Scheme real programs
        run: cargo test -p mae-scheme --test scheme_programs -- --nocapture
        timeout-minutes: 5
      - name: Scheme IO port tests
        run: cargo test -p mae-scheme --test scheme_io_ports -- --nocapture
        timeout-minutes: 5
      - name: Unit tests
        run: cargo test -p mae-scheme --lib
        timeout-minutes: 5

  collab-e2e:
    name: collab / docker e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run collab E2E
        run: make docker-collab-test
        timeout-minutes: 15

  install-test:
    name: install / script validation
    runs-on: ubuntu-latest
    needs: [check, daemon]
    steps:
      - uses: actions/checkout@v7

      - name: Download editor binaries + manual KB
        uses: actions/download-artifact@v8
        with:
          name: mae-binary
          path: /tmp/mae-dl

      - name: Download daemon binary
        uses: actions/download-artifact@v8
        with:
          name: mae-daemon-binary
          path: /tmp/daemon-dl

      - name: Assemble tarball directory
        run: |
          mkdir -p /tmp/mae-pkg
          cp /tmp/mae-dl/mae /tmp/mae-pkg/mae
          cp /tmp/mae-dl/mae-mcp-shim /tmp/mae-pkg/mae-mcp-shim
          cp /tmp/daemon-dl/mae-daemon /tmp/mae-pkg/mae-daemon
          chmod +x /tmp/mae-pkg/mae /tmp/mae-pkg/mae-mcp-shim /tmp/mae-pkg/mae-daemon
          cp -r /tmp/mae-dl/mae-manual.cozo /tmp/mae-pkg/mae-manual.cozo
          cp /tmp/mae-dl/mae-manual.cozo.sha256 /tmp/mae-pkg/mae-manual.cozo.sha256
          cp -r modules /tmp/mae-pkg/modules
          cp assets/sample-config.toml /tmp/mae-pkg/sample-config.toml
          cp assets/daemon-config.toml /tmp/mae-pkg/daemon-config.toml
          cp assets/mae-daemon.service /tmp/mae-pkg/mae-daemon.service
          cp assets/com.cuttlefisch.mae-daemon.plist /tmp/mae-pkg/com.cuttlefisch.mae-daemon.plist
          cp assets/install.sh /tmp/mae-pkg/install.sh
          chmod +x /tmp/mae-pkg/install.sh

      - name: Run install.sh (fresh)
        run: |
          cd /tmp/mae-pkg
          ./install.sh "$HOME/.local"

      - name: Verify fresh install
        run: |
          set -e
          echo "=== Checking binaries ==="
          test -x "$HOME/.local/bin/mae"              && echo "OK: mae"
          test -x "$HOME/.local/bin/mae-mcp-shim"     && echo "OK: mae-mcp-shim"
          test -x "$HOME/.local/bin/mae-daemon"        && echo "OK: mae-daemon"

          echo "=== Checking data ==="
          test -d "$HOME/.local/share/mae/mae-manual.cozo"  && echo "OK: manual KB"
          test -d "$HOME/.local/share/mae/modules"          && echo "OK: modules"
          MODULE_COUNT=$(find "$HOME/.local/share/mae/modules" -name "module.toml" | wc -l)
          test "$MODULE_COUNT" -ge 10 && echo "OK: $MODULE_COUNT modules found"

          echo "=== Checking config ==="
          test -f "$HOME/.config/mae/config.toml"   && echo "OK: config.toml"
          test -f "$HOME/.config/mae/daemon.toml"    && echo "OK: daemon.toml"

          echo "=== Checking systemd units ==="
          test -f "$HOME/.config/systemd/user/mae-daemon.service"  && echo "OK: mae-daemon.service"

          echo "=== Checking binary runs ==="
          "$HOME/.local/bin/mae" --version
          "$HOME/.local/bin/mae" --check-config

          echo "=== Checking install script output reported no errors ==="
          cd /tmp/mae-pkg
          OUTPUT=$(./install.sh "$HOME/.local" 2>&1)
          if echo "$OUTPUT" | grep -q '\[!!\]'; then
            echo "FAIL: install script reported errors"
            echo "$OUTPUT" | grep '\[!!\]'
            exit 1
          fi
          echo "OK: install script reports clean"

      - name: Verify upgrade (reinstall over existing)
        run: |
          set -e
          # Add a sentinel to config to verify it's preserved
          echo "# user customization" >> "$HOME/.config/mae/config.toml"
          BEFORE=$(wc -l < "$HOME/.config/mae/config.toml")

          # Run install again — should detect upgrade
          cd /tmp/mae-pkg && ./install.sh "$HOME/.local"

          # Config must NOT have been overwritten
          AFTER=$(wc -l < "$HOME/.config/mae/config.toml")
          test "$BEFORE" -eq "$AFTER" && echo "OK: config preserved on upgrade"
          grep -q "user customization" "$HOME/.config/mae/config.toml" && echo "OK: sentinel line preserved"

          # Binaries must still work
          "$HOME/.local/bin/mae" --version && echo "OK: mae works after upgrade"

      - name: Verify uninstall via install.sh
        run: |
          set -e
          cd /tmp/mae-pkg && ./install.sh --uninstall "$HOME/.local"

          echo "=== Checking binaries removed ==="
          ! test -f "$HOME/.local/bin/mae"              && echo "OK: mae removed"
          ! test -f "$HOME/.local/bin/mae-mcp-shim"     && echo "OK: mae-mcp-shim removed"
          ! test -f "$HOME/.local/bin/mae-daemon"        && echo "OK: mae-daemon removed"

          echo "=== Checking data removed ==="
          ! test -d "$HOME/.local/share/mae/mae-manual.cozo"  && echo "OK: manual KB removed"
          ! test -d "$HOME/.local/share/mae/modules"          && echo "OK: modules removed"

          echo "=== Checking systemd units removed ==="
          ! test -f "$HOME/.config/systemd/user/mae-daemon.service"  && echo "OK: daemon unit removed"

          echo "=== Checking config preserved ==="
          test -f "$HOME/.config/mae/config.toml"  && echo "OK: config.toml preserved"
          test -f "$HOME/.config/mae/daemon.toml"   && echo "OK: daemon.toml preserved"

      - name: Verify reinstall after uninstall
        run: |
          set -e
          cd /tmp/mae-pkg && ./install.sh "$HOME/.local"
          "$HOME/.local/bin/mae" --version && echo "OK: clean reinstall works"
          # Config should still have the sentinel from the upgrade test
          grep -q "user customization" "$HOME/.config/mae/config.toml" && echo "OK: user config survived uninstall+reinstall"

      - name: Verify Makefile uninstall
        run: |
          make uninstall
          ! test -f "$HOME/.local/bin/mae"         && echo "OK: mae removed"
          ! test -f "$HOME/.local/bin/mae-daemon"  && echo "OK: mae-daemon removed"
          echo "OK: Makefile uninstall clean"

  code-map:
    name: code-map freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check code-map freshness
        run: |
          make code-map
          if git diff --quiet docs/CODE_MAP.md docs/CODE_MAP.json; then
            echo "✅ Code map is up to date."
          else
            echo "❌ Code map is stale. Run 'make code-map' and commit before merging."
            git diff --stat docs/CODE_MAP.md docs/CODE_MAP.json
            exit 1
          fi
