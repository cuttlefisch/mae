name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Determine version bump type
        id: bump-type
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          # Skip version bump entirely with release:none label.
          # Only bump minor/major with explicit PR labels.
          # Default is always patch — no commit message inference.
          if echo "$PR_LABELS" | grep -q 'release:none'; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "Bump type: none (skipped via PR label)"
          elif echo "$PR_LABELS" | grep -q 'release:major'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
            echo "Bump type: major (from PR label)"
          elif echo "$PR_LABELS" | grep -q 'release:minor'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "Bump type: minor (from PR label)"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "Bump type: patch (default)"
          fi

      - name: Bump version
        if: steps.bump-type.outputs.bump != 'none'
        id: version
        run: |
          if [ -f VERSION ]; then
            CURRENT=$(cat VERSION)
          else
            CURRENT="0.1.0"
          fi

          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "${{ steps.bump-type.outputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          NEW="${major}.${minor}.${patch}"
          echo "$NEW" > VERSION
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped: $CURRENT -> $NEW"

      - name: Update Cargo.toml versions
        if: steps.bump-type.outputs.bump != 'none'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update the workspace version in the root Cargo.toml.
          # Editor crates use version.workspace = true, so the root handles them.
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
          echo "Updated root Cargo.toml to $VERSION"

          # Shared crates and daemon have their own version fields (not workspace-inherited).
          for f in shared/kb/Cargo.toml shared/sync/Cargo.toml shared/mcp/Cargo.toml daemon/Cargo.toml; do
            sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" "$f"
            echo "Updated $f to $VERSION"
          done

          # Update install script version string.
          sed -i "s/^VERSION=\".*\"/VERSION=\"$VERSION\"/" assets/install.sh
          echo "Updated assets/install.sh to $VERSION"

      - name: Generate changelog
        if: steps.bump-type.outputs.bump != 'none'
        run: |
          cargo install git-cliff
          git cliff --output CHANGELOG.md
          echo "Generated CHANGELOG.md"

      - name: Commit version bump
        if: steps.bump-type.outputs.bump != 'none'
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md Cargo.toml \
            shared/kb/Cargo.toml shared/sync/Cargo.toml shared/mcp/Cargo.toml \
            daemon/Cargo.toml assets/install.sh
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Wait for CI to pass on main
        if: steps.bump-type.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          # Get the SHA of the version bump commit we just pushed
          SHA=$(git rev-parse HEAD)
          echo "Waiting for CI on commit $SHA..."

          # Poll for up to 20 minutes (CI typically takes ~10-15 min)
          for i in $(seq 1 40); do
            # Check if the CI workflow has completed on this commit
            STATUS=$(gh api "repos/${{ github.repository }}/commits/${SHA}/status" --jq '.state' 2>/dev/null || echo "pending")

            # Also check the check-suites (Actions use check runs, not commit statuses)
            CONCLUSION=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-suites" \
              --jq '[.check_suites[] | select(.app.slug == "github-actions")] | if length == 0 then "pending" elif all(.conclusion == "success" or .conclusion == "skipped") then "success" elif any(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled") then "failure" else "pending" end' 2>/dev/null || echo "pending")

            echo "  Attempt $i: status=$STATUS, check-suites=$CONCLUSION"

            if [ "$CONCLUSION" = "success" ]; then
              echo "CI passed!"
              break
            elif [ "$CONCLUSION" = "failure" ]; then
              echo "::error::CI failed on main — skipping tag to prevent broken release"
              exit 1
            fi

            sleep 30
          done

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI did not complete within 20 minutes — skipping tag"
            exit 1
          fi

      - name: Tag release
        if: steps.bump-type.outputs.bump != 'none'
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          # Delete existing tag if present (handles re-runs after partial failure)
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          git tag "$VERSION"
          git push origin --tags
