name: Bug Report
description: Report a bug in MAE
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open MAE with `mae --gui file.rs`
        2. Press `SPC a p` to start AI conversation
        3. ...
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - GUI (winit + Skia)
        - Terminal (ratatui)
        - Both
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows / WSL
        - Other
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor Output
      description: |
        Paste the output of `mae doctor` (or `mae --check-config --report` if doctor is unavailable).
      render: text
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, config excerpts, or anything else relevant.
    validations:
      required: false
